<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>OmniStudy AI Pro | Scan & Solve Any Subject</title>
  <!-- Include Tesseract.js for actual OCR -->
  <script src="https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --bg1: #071026;
      --bg2: #0b1220;
      --muted: #9ca3af;
      --accent: #6366f1;
      --accent2: #60a5fa;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(96, 165, 250, 0.08), transparent 8%),
                  radial-gradient(900px 500px at 90% 90%, rgba(99, 102, 241, 0.06), transparent 6%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      color: #e6eef8;
      padding: 24px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 480px;
      gap: 24px;
      align-items: start;
    }

    /* Calculator Panel */
    .calculator-wrapper {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.85), rgba(12, 18, 30, 0.6));
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.08);
      backdrop-filter: blur(4px);
    }

    .calculator-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .ai-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      font-size: 0.75rem;
    }

    .ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .display {
      padding: 16px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.3);
      margin: 12px 0;
    }

    .expression {
      min-height: 28px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: right;
      word-break: break-word;
    }

    .result {
      font-size: 2.2rem;
      font-weight: 700;
      text-align: right;
      color: #e6eef8;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .btn {
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(10, 14, 20, 0.95));
      color: #e6eef8;
      transition: transform 0.1s;
    }

    .btn:active { transform: translateY(2px); }
    .btn-operator { background: linear-gradient(180deg, #4f46e5, #6366f1); color: white; }
    .btn-ac { background: linear-gradient(180deg, #dc2626, #b91c1c); }
    .btn-equal { background: linear-gradient(135deg, #22c55e, #16a34a); grid-column: span 2; }

    /* Scanner Panel */
    .scanner-panel {
      background: linear-gradient(180deg, rgba(8, 12, 20, 0.7), rgba(10, 14, 24, 0.55));
      border-radius: 24px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scan-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .scan-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .scan-btn:hover { transform: scale(1.02); background: linear-gradient(135deg, #818cf8, #a78bfa); }
    .camera-controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .cam-btn { background: #334155; border: none; padding: 6px 12px; border-radius: 20px; color: white; cursor: pointer; font-size: 0.7rem; }

    .file-input-hidden { display: none; }

    .preview-area {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 16px;
      padding: 12px;
      margin: 12px 0;
      max-height: 200px;
      overflow: auto;
      border: 1px dashed rgba(99, 102, 241, 0.4);
    }

    .extracted-text {
      font-size: 0.85rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      font-family: monospace;
    }

    .answer-area {
      background: rgba(15, 23, 42, 0.6);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      border-left: 4px solid var(--success);
    }

    .subject-badge {
      display: inline-block;
      background: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-bottom: 10px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .history-list {
      max-height: 180px;
      overflow-y: auto;
      margin-top: 12px;
    }

    .history-item {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid rgba(148,163,184,0.1);
    }

    .camera-preview {
      width: 100%;
      border-radius: 16px;
      margin: 8px 0;
      background: #000;
      display: none;
    }

    @media (max-width: 1000px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Calculator -->
  <div class="calculator-wrapper">
    <div class="calculator-header">
      <span style="color: var(--muted);">Smart Calculator</span>
      <div class="ai-pill"><div class="ai-dot"></div> AI Core</div>
    </div>
    <div class="display">
      <div id="calcExpr" class="expression"></div>
      <div id="calcRes" class="result">0</div>
    </div>
    <div class="keypad">
      <button class="btn btn-ac" data-cmd="ac">AC</button>
      <button class="btn" data-cmd="back">⌫</button>
      <button class="btn" data-val="(">(</button>
      <button class="btn btn-operator" data-val="/">÷</button>
      <button class="btn" data-val="7">7</button><button class="btn" data-val="8">8</button><button class="btn" data-val="9">9</button>
      <button class="btn btn-operator" data-val="*">×</button>
      <button class="btn" data-val="4">4</button><button class="btn" data-val="5">5</button><button class="btn" data-val="6">6</button>
      <button class="btn btn-operator" data-val="-">−</button>
      <button class="btn" data-val="1">1</button><button class="btn" data-val="2">2</button><button class="btn" data-val="3">3</button>
      <button class="btn btn-operator" data-val="+">+</button>
      <button class="btn" data-val="%">%</button>
      <button class="btn" data-val="0">0</button>
      <button class="btn" data-val=".">.</button>
      <button class="btn btn-equal" data-cmd="equal">=</button>
      <button class="btn" data-val="ans">ans</button>
      <button class="btn" data-cmd="pm">+/−</button>
      <button class="btn" data-val=")">)</button>
    </div>
    <div id="calcHistory" class="history-list"></div>
  </div>

  <!-- Scanner & AI Solver Panel with REAL OCR -->
  <div class="scanner-panel">
    <div class="panel-header">
      <h3 style="color: #c7d2fe;">📸 Scan & Solve Any Subject</h3>
      <div class="scan-buttons">
        <button id="cameraBtn" class="scan-btn">📷 Take Picture</button>
        <button id="uploadBtn" class="scan-btn">📁 Upload Image/File</button>
      </div>
    </div>
    
    <input type="file" id="fileInput" class="file-input-hidden" accept="image/*,.txt,.pdf,.doc,.docx,application/pdf,text/plain" />
    
    <!-- Camera Preview with Manual Capture -->
    <video id="cameraVideo" class="camera-preview" autoplay playsinline></video>
    <div id="cameraControls" style="display: none; gap: 10px; margin: 8px 0; flex-wrap: wrap;">
      <button id="switchCameraBtn" class="cam-btn">🔄 Switch Camera</button>
      <button id="capturePhotoBtn" class="cam-btn" style="background: #22c55e;">📸 Capture</button>
      <button id="closeCameraBtn" class="cam-btn" style="background: #ef4444;">✖ Close</button>
    </div>
    <canvas id="photoCanvas" style="display: none;"></canvas>
    
    <div id="previewArea" class="preview-area" style="display: none;">
      <div style="display: flex; justify-content: space-between;">
        <span>📄 Extracted Text (OCR)</span>
        <button id="clearPreview" style="background: none; border: none; color: #ef4444; cursor: pointer;">✖</button>
      </div>
      <div id="extractedTextDisplay" class="extracted-text"></div>
    </div>

    <div id="answerArea" class="answer-area">
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
        <span class="subject-badge" id="subjectTag">🧠 AI Analysis</span>
        <span id="loadingIndicator" style="display: none;"></span>
      </div>
      <div id="aiAnswer">✨ Upload an image, take a photo, or type a question — I'll use OCR to read text from images and solve Math, Physics, Biology, Chemistry, and more!</div>
      <div id="stepByStep" style="margin-top: 12px; font-size: 0.8rem; color: #94a3b8;"></div>
    </div>

    <div style="margin-top: 16px;">
      <div style="font-size: 0.75rem; color: #6b7280;">📌 Recent Scans</div>
      <div id="scanHistory" class="history-list"></div>
    </div>
  </div>
</div>

<script>
  // ======================== CALCULATOR LOGIC ========================
  let calcExpr = "";
  let lastAnsVal = 0;
  let calcHistory = [];

  function formatNum(n) { if (!isFinite(n)) return String(n); if (Math.abs(n - Math.round(n)) < 1e-12) return String(Math.round(n)); return String(Number(n.toFixed(10))).replace(/\.?0+$/, ""); }
  function safeEval(expr) {
    let s = expr.replace(/÷/g, "/").replace(/×/g, "*").replace(/−/g, "-").replace(/(\d)\(/g, "$1*(").replace(/\)(\d)/g, ")*$1");
    s = s.replace(/\bans\b/gi, `(${lastAnsVal})`);
    s = s.replace(/[^0-9+\-*/%.()]/g, "");
    if (!s.trim()) return "";
    try { let v = Function('"use strict"; return (' + s + ')')(); return (typeof v === "number" && isFinite(v)) ? v : ""; } catch(e) { return ""; }
  }
  function updateCalc() {
    document.getElementById("calcExpr").textContent = calcExpr || "";
    let val = safeEval(calcExpr);
    document.getElementById("calcRes").textContent = val === "" ? "0" : formatNum(val);
  }
  function addCalcHistory(e, r) { calcHistory.unshift({ expr: e, result: formatNum(r) }); if(calcHistory.length > 30) calcHistory.pop(); renderCalcHistory(); }
  function renderCalcHistory() {
    let div = document.getElementById("calcHistory"); div.innerHTML = "";
    for(let h of calcHistory.slice(0,20)) { let item = document.createElement("div"); item.className = "history-item"; item.innerHTML = `${h.expr} = ${h.result}`; item.onclick = () => { calcExpr = h.expr; updateCalc(); }; div.appendChild(item); }
  }
  function handleCalc(v) {
    if(v === "ans") { let last = calcExpr.slice(-1); if(last && /[\d\)]/i.test(last)) calcExpr += "*"; calcExpr += "ans"; updateCalc(); return; }
    if(v === "+-") { let m = calcExpr.match(/(.*?)([-+]?\d*\.?\d+|\bans\b)$/i); if(m) { let b = m[1]||"", t = m[2]; if(t.startsWith("-")) calcExpr = b + t.slice(1); else calcExpr = b + "-" + t; } else calcExpr += "-"; updateCalc(); return; }
    if(v === "(") { let last = calcExpr.slice(-1); if(last && /[\d\)a-z]/i.test(last)) calcExpr += "*"; calcExpr += "("; updateCalc(); return; }
    if(v === ")") { calcExpr += ")"; updateCalc(); return; }
    if(v === ".") { let lastNum = calcExpr.match(/(\d*\.?\d+)$/); if(lastNum && lastNum[0].includes(".")) return; calcExpr += "."; updateCalc(); return; }
    if(["+","-","*","/","%"].includes(v)) { let last = calcExpr.slice(-1); if(v === "-" && (calcExpr === "" || last === "" || "+-*/%(".includes(last))) { calcExpr += "-"; updateCalc(); return; } if("+-*/%".includes(last)) calcExpr = calcExpr.slice(0,-1) + v; else calcExpr += v; updateCalc(); return; }
    calcExpr += v; updateCalc();
  }
  function calcEquals() { let v = safeEval(calcExpr); if(v !== "") { lastAnsVal = v; addCalcHistory(calcExpr, v); calcExpr = formatNum(v); updateCalc(); } }
  document.querySelectorAll(".keypad .btn").forEach(btn => { btn.onclick = () => { let val = btn.getAttribute("data-val"); let cmd = btn.getAttribute("data-cmd"); if(val) handleCalc(val); else if(cmd === "ac") { calcExpr = ""; updateCalc(); } else if(cmd === "back") { calcExpr = calcExpr.slice(0,-1); updateCalc(); } else if(cmd === "equal") calcEquals(); else if(cmd === "pm") handleCalc("+-"); }; });
  updateCalc(); renderCalcHistory();

  // ======================== REAL OCR WITH TESSERACT + ADVANCED SOLVER ========================
  let scanHistory = [];
  let currentStream = null;
  let currentFacingMode = "environment"; // back camera default
  
  // Universal AI Solver that actually understands 1+1 and any academic question
  function intelligentSolve(extractedText, fileName = "") {
    const text = extractedText.toLowerCase().trim();
    
    // If text is empty or just noise
    if (!text || text.length < 1) {
      return { subject: "❓ No Text Detected", solution: "No readable text found in the image. Please make sure the image has clear writing, or type your question directly.", steps: "Try using better lighting, writing larger, or uploading a clearer image." };
    }
    
    // ========== DIRECT MATH EXPRESSION DETECTION (like 1+1, 2*3, etc) ==========
    // Look for simple arithmetic patterns
    let mathExprMatch = text.match(/(\d+\s*[\+\-\*\/]\s*\d+)/);
    if (!mathExprMatch) {
      // also try to find patterns like "what is 1+1" or "1 plus 1"
      let plusPattern = text.match(/(\d+)\s*plus\s*(\d+)/i);
      if (plusPattern) mathExprMatch = [`${plusPattern[1]}+${plusPattern[2]}`];
      let timesPattern = text.match(/(\d+)\s*times\s*(\d+)/i);
      if (timesPattern) mathExprMatch = [`${timesPattern[1]}*${timesPattern[2]}`];
      let minusPattern = text.match(/(\d+)\s*minus\s*(\d+)/i);
      if (minusPattern) mathExprMatch = [`${minusPattern[1]}-${minusPattern[2]}`];
    }
    
    if (mathExprMatch) {
      try {
        let expr = mathExprMatch[0];
        let result = Function('"use strict"; return (' + expr + ')')();
        if (isFinite(result)) {
          return { subject: "🧮 Mathematics", solution: `${expr} = ${formatNum(result)}`, steps: `Direct calculation: ${expr} = ${formatNum(result)}` };
        }
      } catch(e) {}
    }
    
    // Check for "1+1" pattern without spaces
    let simpleMath = text.match(/\d+[+\-*/]\d+/);
    if (simpleMath) {
      try {
        let result = Function('"use strict"; return (' + simpleMath[0] + ')')();
        if (isFinite(result)) {
          return { subject: "🧮 Mathematics", solution: `${simpleMath[0]} = ${formatNum(result)}`, steps: `Simple arithmetic: ${simpleMath[0]} = ${formatNum(result)}` };
        }
      } catch(e) {}
    }
    
    // ========== SUBJECT DETECTION WITH ACTUAL SOLVING ==========
    
    // BIOLOGY
    if (text.match(/mitochondria|photosynthesis|cell|dna|rna|osmosis|biology|heart|lungs|enzyme|protein|chloroplast|ecosystem|food chain|nucleus|cytoplasm/i)) {
      if (text.match(/photosynthesis/i)) {
        return { subject: "🧬 Biology", solution: "Photosynthesis: 6CO₂ + 6H₂O + Light Energy → C₆H₁₂O₆ + 6O₂", steps: "Plants convert light energy to chemical energy in chloroplasts. Reactants: CO₂ and H₂O. Products: Glucose and Oxygen." };
      } else if (text.match(/mitochondria/i)) {
        return { subject: "🧬 Biology", solution: "Mitochondria are the 'powerhouses' of the cell, producing ATP through cellular respiration.", steps: "C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 36 ATP. Contains inner/outer membrane, cristae." };
      } else {
        return { subject: "🧬 Biology", solution: "🔬 Biology question detected. Based on your image, I see key biological concepts.", steps: "Please provide more specific details or write the exact question for a precise answer." };
      }
    }
    
    // PHYSICS
    else if (text.match(/force|newton|velocity|acceleration|kinetic|potential|ohm|resistance|circuit|gravity|f=ma|momentum|work|joule|watt|physics|speed|distance|time/i)) {
      let nums = text.match(/-?\d+(\.\d+)?/g) || [];
      if (text.match(/f\s*=\s*ma|force|newton/i) && nums.length >= 2) {
        let m = parseFloat(nums[0]), a = parseFloat(nums[1]);
        return { subject: "⚡ Physics", solution: `F = m × a = ${m} × ${a} = ${m * a} N`, steps: "Newton's Second Law: Force equals mass times acceleration." };
      } else if (text.match(/ke|kinetic energy/i) && nums.length >= 2) {
        let m = parseFloat(nums[0]), v = parseFloat(nums[1]);
        return { subject: "⚡ Physics", solution: `KE = ½mv² = ½ × ${m} × ${v}² = ${0.5 * m * v * v} J`, steps: "Kinetic energy = half × mass × velocity squared." };
      } else if (text.match(/v=ir|ohm|resistance/i) && nums.length >= 2) {
        let v = parseFloat(nums[0]), r = parseFloat(nums[1]);
        return { subject: "⚡ Physics", solution: `I = V/R = ${v} / ${r} = ${v/r} A`, steps: "Ohm's Law: Current = Voltage / Resistance" };
      } else {
        return { subject: "⚡ Physics", solution: "📐 Physics question detected. Common formulas: F=ma, KE=½mv², V=IR, p=mv.", steps: "Provide specific values for numeric solutions." };
      }
    }
    
    // CHEMISTRY
    else if (text.match(/mole|molar|hcl|naoh|chemical|reaction|equation|periodic|atomic|valence|stoichiometry|ph|acid|base|chemistry|h2o|co2/i)) {
      if (text.match(/ph|acid|base/i)) {
        return { subject: "🧪 Chemistry", solution: "pH = -log₁₀[H⁺]. Neutral pH=7, Acidic <7, Basic >7.", steps: "Strong acids fully dissociate. pOH = 14 - pH." };
      } else if (text.match(/mole|molar mass/i)) {
        return { subject: "🧪 Chemistry", solution: "Mole concept: 1 mole = 6.022×10²³ particles. Molar mass = grams/mole.", steps: "Use n = mass / molar mass for calculations." };
      } else {
        return { subject: "🧪 Chemistry", solution: "⚗️ Chemistry query detected. Common topics: balancing equations, molarity, stoichiometry.", steps: "Please provide the specific chemical equation or values." };
      }
    }
    
    // MATHEMATICS (comprehensive)
    else {
      // Prime detection
      if (text.match(/first prime|1st prime|what.*first.*prime/)) {
        return { subject: "📐 Mathematics", solution: "The first prime number is 2.", steps: "Prime numbers are greater than 1 with only two factors: 1 and itself. 2, 3, 5, 7, 11... 2 is the smallest and only even prime." };
      }
      if (text.match(/prime/i) && text.match(/\d+/)) {
        let primeMatch = text.match(/(\d+)/);
        if (primeMatch) {
          let n = parseInt(primeMatch[1]);
          let isP = isPrimeNum(n);
          return { subject: "📐 Mathematics", solution: `${n} is ${isP ? "✅ a prime number" : "❌ not prime (composite)"}`, steps: isP ? `No divisors other than 1 and ${n}.` : `Has factors other than 1 and itself.` };
        }
      }
      // Median
      if (text.match(/median/i)) {
        let nums = extractNumbers(text);
        if (nums.length) {
          let med = calculateMedian(nums);
          return { subject: "📐 Mathematics", solution: `Median = ${med}`, steps: `Data: [${nums.join(", ")}] → sorted: ${[...nums].sort((a,b)=>a-b).join(", ")} → median = ${med}` };
        }
      }
      // Triangle area
      if (text.match(/triangle|area.*triangle/i)) {
        let baseMatch = text.match(/base\s*(\d+\.?\d*)/i);
        let heightMatch = text.match(/height\s*(\d+\.?\d*)/i);
        if (baseMatch && heightMatch) {
          let area = 0.5 * parseFloat(baseMatch[1]) * parseFloat(heightMatch[1]);
          return { subject: "📐 Mathematics", solution: `Triangle Area = ½ × base × height = ${area}`, steps: `Base = ${baseMatch[1]}, Height = ${heightMatch[1]}` };
        }
        let sides = extractNumbers(text);
        if (sides.length >= 3) {
          let s = (sides[0] + sides[1] + sides[2]) / 2;
          let area = Math.sqrt(Math.max(0, s * (s - sides[0]) * (s - sides[1]) * (s - sides[2])));
          return { subject: "📐 Mathematics", solution: `Triangle Area (Heron) = ${area.toFixed(4)}`, steps: `Sides: ${sides[0]}, ${sides[1]}, ${sides[2]}` };
        }
      }
      // Linear equation
      let eqMatch = text.match(/(\d*)x\s*([+-]\s*\d+)?\s*=\s*(\d+)/i);
      if (eqMatch) {
        let a = eqMatch[1] ? parseFloat(eqMatch[1]) : 1;
        let b = eqMatch[2] ? parseFloat(eqMatch[2].replace(/\s/g, "")) : 0;
        let c = parseFloat(eqMatch[3]);
        let x = (c - b) / a;
        return { subject: "📐 Mathematics", solution: `x = ${formatNum(x)}`, steps: `${a}x + ${b} = ${c} → ${a}x = ${c - b} → x = ${(c - b) / a}` };
      }
      
      // If we have numbers, try to evaluate any arithmetic
      let allNumbers = extractNumbers(text);
      if (allNumbers.length >= 2 && text.match(/[+\-*/]/)) {
        try {
          let expr = text.replace(/[^0-9+\-*/.]/g, "");
          if (expr && /[\d+\-*/]/.test(expr)) {
            let result = Function('"use strict"; return (' + expr + ')')();
            if (isFinite(result)) {
              return { subject: "🧮 Mathematics", solution: `${expr} = ${formatNum(result)}`, steps: `Calculated: ${expr} = ${formatNum(result)}` };
            }
          }
        } catch(e) {}
      }
      
      // Fallback for any text with numbers
      if (allNumbers.length) {
        return { subject: "📐 Mathematics", solution: `I detected numbers: ${allNumbers.join(", ")}. What operation would you like to perform?`, steps: "Try: addition, subtraction, multiplication, division, median, prime check, etc." };
      }
      
      return { subject: "📐 Mathematics", solution: `I read: "${extractedText.slice(0, 100)}"`, steps: "Please type your question clearly, or ensure the image has readable text. I can solve math, physics, biology, and chemistry problems!" };
    }
  }
  
  function isPrimeNum(n) { if(n<2) return false; if(n===2) return true; if(n%2===0) return false; for(let i=3;i<=Math.sqrt(n);i+=2) if(n%i===0) return false; return true; }
  function extractNumbers(str) { let nums = []; str.replace(/-?\d+(\.\d+)?/g, m => nums.push(parseFloat(m))); return nums; }
  function calculateMedian(nums) { let s = [...nums].sort((a,b)=>a-b); let m = Math.floor(s.length/2); return s.length%2===0 ? (s[m-1]+s[m])/2 : s[m]; }
  
  // OCR using Tesseract.js
  async function performOCR(imageBlob) {
    const worker = await Tesseract.createWorker('eng');
    const { data: { text } } = await worker.recognize(imageBlob);
    await worker.terminate();
    return text.trim();
  }
  
  async function processImageFile(file) {
    document.getElementById("loadingIndicator").style.display = "inline-block";
    document.getElementById("loadingIndicator").innerHTML = "<div class='loading'></div> OCR Reading...";
    
    try {
      let extractedText = "";
      if (file.type.startsWith("image/")) {
        extractedText = await performOCR(file);
      } else if (file.type === "text/plain" || file.name.endsWith(".txt")) {
        extractedText = await file.text();
      } else {
        extractedText = `[Document: ${file.name}] For PDF/Word files, please extract text manually or use clear image.`;
      }
      
      if (!extractedText || extractedText.length < 2) {
        extractedText = "No readable text detected in image.";
      }
      
      document.getElementById("previewArea").style.display = "block";
      document.getElementById("extractedTextDisplay").innerHTML = escapeHtml(extractedText.slice(0, 500)) + (extractedText.length > 500 ? "..." : "");
      
      let result = intelligentSolve(extractedText, file.name);
      document.getElementById("subjectTag").innerHTML = result.subject;
      document.getElementById("aiAnswer").innerHTML = `<strong>🎓 AI Solution:</strong><br>${escapeHtml(result.solution)}`;
      document.getElementById("stepByStep").innerHTML = `<span style="color: #a5b4fc;">📖 ${escapeHtml(result.steps)}</span>`;
      
      scanHistory.unshift({ name: file.name, preview: result.solution.slice(0, 60), subject: result.subject });
      if(scanHistory.length > 15) scanHistory.pop();
      renderScanHistory();
      
      let numMatch = result.solution.match(/-?\d+(\.\d+)?/);
      if (numMatch) lastAnsVal = parseFloat(numMatch[0]);
      
    } catch(e) {
      console.error(e);
      document.getElementById("aiAnswer").innerHTML = "⚠️ OCR failed. Please ensure the image has clear text, or type your question directly.";
    }
    document.getElementById("loadingIndicator").style.display = "none";
  }
  
  function renderScanHistory() {
    let container = document.getElementById("scanHistory");
    container.innerHTML = "";
    for(let item of scanHistory.slice(0, 10)) {
      let div = document.createElement("div");
      div.className = "history-item";
      div.innerHTML = `<span>📎 ${escapeHtml(item.name.slice(0, 30))}</span><span style="color: #86efac;"> → ${escapeHtml(item.preview)}</span>`;
      container.appendChild(div);
    }
  }
  
  function escapeHtml(s) { return String(s).replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
  
  // ======================== CAMERA WITH MANUAL CAPTURE & FRONT/BACK SWITCH ========================
  const video = document.getElementById("cameraVideo");
  const canvas = document.getElementById("photoCanvas");
  const cameraControls = document.getElementById("cameraControls");
  let currentStreamActive = false;
  
  async function startCamera(facingMode = "environment") {
    if (currentStreamActive) {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    }
    try {
      const constraints = { video: { facingMode: { exact: facingMode } } };
      currentStream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = currentStream;
      video.style.display = "block";
      cameraControls.style.display = "flex";
      currentStreamActive = true;
    } catch(err) {
      // Fallback to any camera
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = currentStream;
        video.style.display = "block";
        cameraControls.style.display = "flex";
        currentStreamActive = true;
      } catch(e) { alert("Camera access denied or unavailable"); }
    }
  }
  
  function stopCamera() {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    video.style.display = "none";
    cameraControls.style.display = "none";
    currentStreamActive = false;
  }
  
  function captureAndProcess() {
    if (!video.videoWidth) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(async (blob) => {
      const file = new File([blob], "captured-photo.jpg", { type: "image/jpeg" });
      await processImageFile(file);
      stopCamera();
    }, "image/jpeg");
  }
  
  document.getElementById("cameraBtn").onclick = async () => {
    currentFacingMode = "environment";
    await startCamera("environment");
  };
  
  document.getElementById("switchCameraBtn").onclick = async () => {
    currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
    await startCamera(currentFacingMode);
  };
  
  document.getElementById("capturePhotoBtn").onclick = captureAndProcess;
  document.getElementById("closeCameraBtn").onclick = stopCamera;
  
  document.getElementById("uploadBtn").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange = async (e) => {
    if (e.target.files.length) {
      await processImageFile(e.target.files[0]);
    }
  };
  document.getElementById("clearPreview").onclick = () => document.getElementById("previewArea").style.display = "none";
  
  renderScanHistory();
</script>
</body>
</html>
