<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>OmniStudy AI | Scan & Solve Any Subject</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --bg1: #071026;
      --bg2: #0b1220;
      --muted: #9ca3af;
      --accent: #6366f1;
      --accent2: #60a5fa;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(96, 165, 250, 0.08), transparent 8%),
                  radial-gradient(900px 500px at 90% 90%, rgba(99, 102, 241, 0.06), transparent 6%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      color: #e6eef8;
      padding: 24px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 480px;
      gap: 24px;
      align-items: start;
    }

    /* Calculator Panel */
    .calculator-wrapper {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.85), rgba(12, 18, 30, 0.6));
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.08);
      backdrop-filter: blur(4px);
    }

    .calculator-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .ai-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      font-size: 0.75rem;
    }

    .ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .display {
      padding: 16px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.3);
      margin: 12px 0;
    }

    .expression {
      min-height: 28px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: right;
      word-break: break-word;
    }

    .result {
      font-size: 2.2rem;
      font-weight: 700;
      text-align: right;
      color: #e6eef8;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .btn {
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(10, 14, 20, 0.95));
      color: #e6eef8;
      transition: transform 0.1s;
    }

    .btn:active { transform: translateY(2px); }
    .btn-operator { background: linear-gradient(180deg, #4f46e5, #6366f1); color: white; }
    .btn-ac { background: linear-gradient(180deg, #dc2626, #b91c1c); }
    .btn-equal { background: linear-gradient(135deg, #22c55e, #16a34a); grid-column: span 2; }

    /* Scanner Panel */
    .scanner-panel {
      background: linear-gradient(180deg, rgba(8, 12, 20, 0.7), rgba(10, 14, 24, 0.55));
      border-radius: 24px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scan-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .scan-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .scan-btn:hover { transform: scale(1.02); background: linear-gradient(135deg, #818cf8, #a78bfa); }

    .file-input-hidden { display: none; }

    .preview-area {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 16px;
      padding: 12px;
      margin: 12px 0;
      max-height: 200px;
      overflow: auto;
      border: 1px dashed rgba(99, 102, 241, 0.4);
    }

    .extracted-text {
      font-size: 0.85rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      font-family: monospace;
    }

    .answer-area {
      background: rgba(15, 23, 42, 0.6);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      border-left: 4px solid var(--success);
    }

    .subject-badge {
      display: inline-block;
      background: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-bottom: 10px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .history-list {
      max-height: 180px;
      overflow-y: auto;
      margin-top: 12px;
    }

    .history-item {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid rgba(148,163,184,0.1);
    }

    @media (max-width: 1000px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Calculator -->
  <div class="calculator-wrapper">
    <div class="calculator-header">
      <span style="color: var(--muted);">Smart Calculator</span>
      <div class="ai-pill"><div class="ai-dot"></div> AI Core</div>
    </div>
    <div class="display">
      <div id="calcExpr" class="expression"></div>
      <div id="calcRes" class="result">0</div>
    </div>
    <div class="keypad">
      <button class="btn btn-ac" data-cmd="ac">AC</button>
      <button class="btn" data-cmd="back">⌫</button>
      <button class="btn" data-val="(">(</button>
      <button class="btn btn-operator" data-val="/">÷</button>
      <button class="btn" data-val="7">7</button><button class="btn" data-val="8">8</button><button class="btn" data-val="9">9</button>
      <button class="btn btn-operator" data-val="*">×</button>
      <button class="btn" data-val="4">4</button><button class="btn" data-val="5">5</button><button class="btn" data-val="6">6</button>
      <button class="btn btn-operator" data-val="-">−</button>
      <button class="btn" data-val="1">1</button><button class="btn" data-val="2">2</button><button class="btn" data-val="3">3</button>
      <button class="btn btn-operator" data-val="+">+</button>
      <button class="btn" data-val="%">%</button>
      <button class="btn" data-val="0">0</button>
      <button class="btn" data-val=".">.</button>
      <button class="btn btn-equal" data-cmd="equal">=</button>
      <button class="btn" data-val="ans">ans</button>
      <button class="btn" data-cmd="pm">+/−</button>
      <button class="btn" data-val=")">)</button>
    </div>
    <div id="calcHistory" class="history-list"></div>
  </div>

  <!-- Scanner & AI Solver Panel -->
  <div class="scanner-panel">
    <div class="panel-header">
      <h3 style="color: #c7d2fe;">📸 Scan & Solve Any Subject</h3>
      <div class="scan-buttons">
        <button id="cameraBtn" class="scan-btn">📷 Take Picture</button>
        <button id="uploadBtn" class="scan-btn">📁 Upload File</button>
      </div>
    </div>
    
    <input type="file" id="fileInput" class="file-input-hidden" accept="image/*,.txt,.pdf,.doc,.docx,application/pdf,text/plain" multiple />
    <video id="cameraVideo" autoplay playsinline style="display: none; width: 100%; border-radius: 16px; margin: 8px 0;"></video>
    <canvas id="photoCanvas" style="display: none;"></canvas>
    
    <div id="previewArea" class="preview-area" style="display: none;">
      <div style="display: flex; justify-content: space-between;">
        <span>📄 Extracted Text Preview</span>
        <button id="clearPreview" style="background: none; border: none; color: #ef4444; cursor: pointer;">✖</button>
      </div>
      <div id="extractedTextDisplay" class="extracted-text"></div>
    </div>

    <div id="answerArea" class="answer-area">
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
        <span class="subject-badge" id="subjectTag">🧠 AI Analysis</span>
        <span id="loadingIndicator" style="display: none;"></span>
      </div>
      <div id="aiAnswer">✨ Upload an image, PDF, or take a photo — I'll extract the question and solve it for Math, Physics, Biology, Chemistry, or any subject!</div>
      <div id="stepByStep" style="margin-top: 12px; font-size: 0.8rem; color: #94a3b8;"></div>
    </div>

    <div style="margin-top: 16px;">
      <div style="font-size: 0.75rem; color: #6b7280;">📌 Recent Scans</div>
      <div id="scanHistory" class="history-list"></div>
    </div>
  </div>
</div>

<script>
  // ======================== CALCULATOR LOGIC ========================
  let calcExpr = "";
  let lastAnsVal = 0;
  let calcHistory = [];

  function formatNum(n) { if (!isFinite(n)) return String(n); if (Math.abs(n - Math.round(n)) < 1e-12) return String(Math.round(n)); return String(Number(n.toFixed(10))).replace(/\.?0+$/, ""); }
  function safeEval(expr) {
    let s = expr.replace(/÷/g, "/").replace(/×/g, "*").replace(/−/g, "-").replace(/(\d)\(/g, "$1*(").replace(/\)(\d)/g, ")*$1");
    s = s.replace(/\bans\b/gi, `(${lastAnsVal})`);
    s = s.replace(/[^0-9+\-*/%.()]/g, "");
    if (!s.trim()) return "";
    try { let v = Function('"use strict"; return (' + s + ')')(); return (typeof v === "number" && isFinite(v)) ? v : ""; } catch(e) { return ""; }
  }
  function updateCalc() {
    document.getElementById("calcExpr").textContent = calcExpr || "";
    let val = safeEval(calcExpr);
    document.getElementById("calcRes").textContent = val === "" ? "0" : formatNum(val);
  }
  function addCalcHistory(e, r) { calcHistory.unshift({ expr: e, result: formatNum(r) }); if(calcHistory.length > 30) calcHistory.pop(); renderCalcHistory(); }
  function renderCalcHistory() {
    let div = document.getElementById("calcHistory"); div.innerHTML = "";
    for(let h of calcHistory.slice(0,20)) { let item = document.createElement("div"); item.className = "history-item"; item.innerHTML = `${h.expr} = ${h.result}`; item.onclick = () => { calcExpr = h.expr; updateCalc(); }; div.appendChild(item); }
  }
  function handleCalc(v) {
    if(v === "ans") { let last = calcExpr.slice(-1); if(last && /[\d\)]/i.test(last)) calcExpr += "*"; calcExpr += "ans"; updateCalc(); return; }
    if(v === "+-") { let m = calcExpr.match(/(.*?)([-+]?\d*\.?\d+|\bans\b)$/i); if(m) { let b = m[1]||"", t = m[2]; if(t.startsWith("-")) calcExpr = b + t.slice(1); else calcExpr = b + "-" + t; } else calcExpr += "-"; updateCalc(); return; }
    if(v === "(") { let last = calcExpr.slice(-1); if(last && /[\d\)a-z]/i.test(last)) calcExpr += "*"; calcExpr += "("; updateCalc(); return; }
    if(v === ")") { calcExpr += ")"; updateCalc(); return; }
    if(v === ".") { let lastNum = calcExpr.match(/(\d*\.?\d+)$/); if(lastNum && lastNum[0].includes(".")) return; calcExpr += "."; updateCalc(); return; }
    if(["+","-","*","/","%"].includes(v)) { let last = calcExpr.slice(-1); if(v === "-" && (calcExpr === "" || last === "" || "+-*/%(".includes(last))) { calcExpr += "-"; updateCalc(); return; } if("+-*/%".includes(last)) calcExpr = calcExpr.slice(0,-1) + v; else calcExpr += v; updateCalc(); return; }
    calcExpr += v; updateCalc();
  }
  function calcEquals() { let v = safeEval(calcExpr); if(v !== "") { lastAnsVal = v; addCalcHistory(calcExpr, v); calcExpr = formatNum(v); updateCalc(); } }
  document.querySelectorAll(".keypad .btn").forEach(btn => { btn.onclick = () => { let val = btn.getAttribute("data-val"); let cmd = btn.getAttribute("data-cmd"); if(val) handleCalc(val); else if(cmd === "ac") { calcExpr = ""; updateCalc(); } else if(cmd === "back") { calcExpr = calcExpr.slice(0,-1); updateCalc(); } else if(cmd === "equal") calcEquals(); else if(cmd === "pm") handleCalc("+-"); }; });
  updateCalc(); renderCalcHistory();

  // ======================== ADVANCED AI SUBJECT SOLVER ========================
  let scanHistory = [];
  let currentStream = null;

  // Universal subject detector & solver (simulated advanced AI that can parse any academic question)
  function intelligentSolve(extractedText, fileName = "") {
    const text = extractedText.toLowerCase();
    
    // Detect subject and question type
    let subject = "General Math";
    let solution = "";
    let steps = "";
    
    // BIOLOGY DETECTION
    if (text.match(/mitochondria|photosynthesis|cell|dna|rna|osmosis|biology|heart|lungs|enzyme|protein|chloroplast|ecosystem|food chain/i)) {
      subject = "🧬 Biology";
      if (text.match(/photosynthesis/i)) {
        solution = "Photosynthesis: 6CO₂ + 6H₂O + Light Energy → C₆H₁₂O₆ + 6O₂. Plants convert light energy to chemical energy in chloroplasts.";
        steps = "Process occurs in chloroplasts, uses chlorophyll, produces glucose and oxygen.";
      } else if (text.match(/mitochondria/i)) {
        solution = "Mitochondria are the 'powerhouses' of the cell, producing ATP through cellular respiration (C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + 36 ATP).";
        steps = "Contains inner/outer membrane, cristae, matrix; site of Krebs cycle and oxidative phosphorylation.";
      } else {
        solution = "🔬 Biology question detected. Based on context: " + extractedText.slice(0, 150) + "... I've identified key concepts. Please provide more specific details for exact answer.";
        steps = "Common topics: cell structure, genetics, evolution, ecology, human anatomy.";
      }
    }
    // PHYSICS DETECTION
    else if (text.match(/force|newton|velocity|acceleration|kinetic energy|potential energy|ohm|resistance|circuit|gravity|f=ma|e=mc|momentum|work|joule|watt|physics/i)) {
      subject = "⚡ Physics";
      let nums = extractedText.match(/-?\d+(\.\d+)?/g) || [];
      if (text.match(/force|f\s*=\s*ma|newton/i)) {
        if (nums.length >= 2) solution = `F = m × a = ${nums[0]} × ${nums[1]} = ${parseFloat(nums[0]) * parseFloat(nums[1])} N (Newtons)`;
        else solution = "Newton's Second Law: F = ma (Force = mass × acceleration). Provide mass and acceleration for numeric answer.";
        steps = "Unit: 1 N = 1 kg·m/s²";
      } else if (text.match(/kinetic energy|ke/i)) {
        if (nums.length >= 2) solution = `KE = ½mv² = ½ × ${nums[0]} × ${nums[1]}² = ${0.5 * nums[0] * Math.pow(nums[1], 2)} J`;
        else solution = "Kinetic Energy = ½ × mass × velocity² (in Joules)";
        steps = "Energy due to motion. SI unit: Joule.";
      } else if (text.match(/ohm|resistance|voltage|current/i)) {
        if (nums.length >= 2) solution = `V = IR → ${nums[0]} = I × ${nums[1]} → I = ${nums[0]/nums[1]} A`;
        else solution = "Ohm's Law: V = IR (Voltage = Current × Resistance)";
        steps = "Unit: Volt (V), Ampere (A), Ohm (Ω)";
      } else {
        solution = "📐 Physics question. Key formulas: F=ma, KE=½mv², PE=mgh, V=IR, p=mv. Provide numbers for calculations.";
        steps = "Identify given values and apply relevant equation.";
      }
    }
    // CHEMISTRY DETECTION
    else if (text.match(/mole|molar|hcl|naoh|chemical|reaction|equation|periodic table|atomic|valence|stoichiometry|ph|acid|base|chemistry/i)) {
      subject = "🧪 Chemistry";
      if (text.match(/mole|molar mass|grams/i)) {
        let nums = extractedText.match(/-?\d+(\.\d+)?/g) || [];
        if (nums.length) solution = `Moles = mass / molar mass. Using given data: ${nums[0]} g → moles calculation needed.`;
        else solution = "Mole concept: 1 mole = 6.022×10²³ particles. Molar mass = grams/mole.";
        steps = "Avogadro's number, stoichiometry coefficients balance reactions.";
      } else if (text.match(/ph|acid|base|h\+|oh-/i)) {
        solution = "pH = -log₁₀[H⁺]. Neutral pH=7, Acidic <7, Basic >7. pOH = 14 - pH.";
        steps = "Strong acids fully dissociate; weak acids partially dissociate.";
      } else {
        solution = "⚗️ Chemistry query detected. Common topics: balancing equations, molarity, stoichiometry, thermodynamics.";
        steps = "Provide specific chemical equation or values for detailed solving.";
      }
    }
    // MATHEMATICS (including geometry, algebra, median, primes, etc)
    else {
      subject = "📐 Mathematics";
      // Prime detection
      if (text.match(/prime|first prime|1st prime/)) {
        if (text.match(/first|1st/)) { solution = "The first prime number is 2."; steps = "Prime numbers: 2, 3, 5, 7, 11... 2 is the smallest and only even prime."; }
        else {
          let primeMatch = text.match(/(\d+)\s*prime/);
          if (primeMatch) { let n = parseInt(primeMatch[1]); let isP = isPrimeNum(n); solution = `${n} is ${isP ? "a prime number" : "not prime (composite)"}.`; steps = isP ? `No divisors other than 1 and ${n}.` : `Has factors.`; }
          else solution = "A prime number is >1 with only two factors: 1 and itself. Examples: 2,3,5,7,11.";
        }
      }
      // Median
      else if (text.match(/median/i)) {
        let nums = extractNumbers(text);
        if (nums.length) { let med = calculateMedian(nums); solution = `Median = ${med}`; steps = `Data: [${nums.join(", ")}] → sorted: ${[...nums].sort((a,b)=>a-b).join(", ")} → median = ${med}`; }
        else solution = "Median is the middle value when data is sorted. Provide numbers to calculate.";
      }
      // Triangle area
      else if (text.match(/triangle|area.*triangle/i)) {
        let baseMatch = text.match(/base\s*(\d+\.?\d*)/i);
        let heightMatch = text.match(/height\s*(\d+\.?\d*)/i);
        if (baseMatch && heightMatch) { let area = 0.5 * parseFloat(baseMatch[1]) * parseFloat(heightMatch[1]); solution = `Triangle Area = ½ × base × height = ${area}`; steps = `Base = ${baseMatch[1]}, Height = ${heightMatch[1]}`; }
        else if (text.match(/sides\s*(\d+)[,\s]+(\d+)[,\s]+(\d+)/i)) { let sides = extractNumbers(text); if(sides.length>=3) { let s = (sides[0]+sides[1]+sides[2])/2; let area = Math.sqrt(s*(s-sides[0])*(s-sides[1])*(s-sides[2])); solution = `Triangle Area (Heron) = ${area.toFixed(4)}`; steps = `Sides: ${sides[0]}, ${sides[1]}, ${sides[2]}`; } }
        else solution = "Triangle area formulas: ½×base×height (right triangle) or Heron's formula (3 sides). Provide values.";
      }
      // Linear equation
      else if (text.match(/solve.*=.*x/i) || text.match(/\d+x\s*[+-]\s*\d+\s*=\s*\d+/)) {
        let eqMatch = text.match(/(\d*)x\s*([+-]\s*\d+)?\s*=\s*(\d+)/i);
        if (eqMatch) {
          let a = eqMatch[1] ? parseFloat(eqMatch[1]) : 1;
          let b = eqMatch[2] ? parseFloat(eqMatch[2].replace(/\s/g, "")) : 0;
          let c = parseFloat(eqMatch[3]);
          let x = (c - b) / a;
          solution = `x = ${formatNum(x)}`;
          steps = `${a}x + ${b} = ${c} → ${a}x = ${c - b} → x = ${(c-b)/a}`;
        } else solution = "Linear equation format: ax + b = c. Example: 2x + 3 = 7 → x = 2";
      }
      // Arithmetic
      else {
        let arith = text.replace(/[^0-9+\-*/%.()]/g, "");
        if (arith && /[\d+\-*/]/.test(arith)) {
          try { let ev = Function('"use strict"; return (' + arith + ')')(); if(isFinite(ev)) solution = `Result = ${formatNum(ev)}`; steps = `Computed: ${arith}`; }
          catch(e) { solution = "I detected a math expression but couldn't evaluate it. Try using +, -, *, /, %"; }
        } else solution = "I can solve math problems: median, prime numbers, triangle area, linear equations, arithmetic. Upload an image of your test question!";
      }
    }
    
    return { subject, solution, steps: steps || "AI analyzed the question from your file/photo. For detailed steps, provide specific numbers." };
  }

  function isPrimeNum(n) { if(n<2) return false; if(n===2) return true; if(n%2===0) return false; for(let i=3;i<=Math.sqrt(n);i+=2) if(n%i===0) return false; return true; }
  function extractNumbers(str) { let nums = []; str.replace(/-?\d+(\.\d+)?/g, m => nums.push(parseFloat(m))); return nums; }
  function calculateMedian(nums) { let s = [...nums].sort((a,b)=>a-b); let m = Math.floor(s.length/2); return s.length%2===0 ? (s[m-1]+s[m])/2 : s[m]; }

  // Simulate OCR & text extraction from image (in real app would use Tesseract.js or cloud API)
  // For demo, we'll simulate extraction with a smart placeholder + allow user to see extracted text
  async function extractTextFromFile(file) {
    if (file.type.startsWith("image/")) {
      // Simulate OCR - in real implementation use Tesseract. For demo, extract from filename & prompt
      return `[Image Analysis] Question detected in image: ${file.name}. I can analyze: math formulas, physics diagrams, biology labels. Please describe the question or re-upload with clearer text. For demo, AI will solve based on common patterns.`;
    } else if (file.type === "text/plain" || file.name.endsWith(".txt")) {
      let text = await file.text();
      return text;
    } else {
      // PDF/DOC simulation
      return `[Document: ${file.name}] Extracted content: This appears to be an academic document. I'll analyze the key question patterns. Based on file, please specify the exact problem for precise solving.`;
    }
  }

  async function processFile(file) {
    document.getElementById("loadingIndicator").style.display = "inline-block";
    document.getElementById("loadingIndicator").innerHTML = "<div class='loading'></div> Processing...";
    try {
      let extracted = await extractTextFromFile(file);
      document.getElementById("previewArea").style.display = "block";
      document.getElementById("extractedTextDisplay").innerHTML = escapeHtml(extracted.slice(0, 500)) + (extracted.length > 500 ? "..." : "");
      
      let result = intelligentSolve(extracted, file.name);
      document.getElementById("subjectTag").innerHTML = result.subject;
      document.getElementById("aiAnswer").innerHTML = `<strong>🎓 AI Solution:</strong><br>${escapeHtml(result.solution)}`;
      document.getElementById("stepByStep").innerHTML = `<span style="color: #a5b4fc;">📖 ${escapeHtml(result.steps)}</span>`;
      
      scanHistory.unshift({ name: file.name, preview: result.solution.slice(0, 60), subject: result.subject });
      if(scanHistory.length > 15) scanHistory.pop();
      renderScanHistory();
      
      lastAnsVal = parseFloat(result.solution.match(/-?\d+(\.\d+)?/)?.[0]) || lastAnsVal;
    } catch(e) {
      document.getElementById("aiAnswer").innerHTML = "⚠️ Error processing file. Try a different format or type your question directly.";
    }
    document.getElementById("loadingIndicator").style.display = "none";
  }

  function renderScanHistory() {
    let container = document.getElementById("scanHistory");
    container.innerHTML = "";
    for(let item of scanHistory.slice(0, 10)) {
      let div = document.createElement("div");
      div.className = "history-item";
      div.innerHTML = `<span>📎 ${escapeHtml(item.name.slice(0, 30))}</span><span style="color: #86efac;"> → ${escapeHtml(item.preview)}</span>`;
      container.appendChild(div);
    }
  }

  function escapeHtml(s) { return String(s).replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }

  // Camera handling
  const video = document.getElementById("cameraVideo");
  const canvas = document.getElementById("photoCanvas");
  let stream = null;

  document.getElementById("cameraBtn").onclick = async () => {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.style.display = "block";
      video.srcObject = stream;
      await video.play();
      setTimeout(() => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        canvas.toBlob(blob => {
          let fakeFile = new File([blob], "camera-photo.jpg", { type: "image/jpeg" });
          processFile(fakeFile);
          if (stream) stream.getTracks().forEach(t => t.stop());
          video.style.display = "none";
        }, "image/jpeg");
      }, 500);
    } catch(err) { alert("Camera access needed for photo capture"); }
  };

  document.getElementById("uploadBtn").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange = (e) => {
    if (e.target.files.length) processFile(e.target.files[0]);
  };
  document.getElementById("clearPreview").onclick = () => document.getElementById("previewArea").style.display = "none";
  
  renderScanHistory();
</script>
</body>
</html>
