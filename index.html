<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Handwriting AI Pro | Multi-Interpretation Scanner + Smart Solver</title>
  <!-- Tesseract.js for OCR -->
  <script src="https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --bg1: #071026;
      --bg2: #0b1220;
      --muted: #9ca3af;
      --accent: #6366f1;
      --accent2: #60a5fa;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --purple-glow: #a855f7;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(96, 165, 250, 0.08), transparent 8%),
                  radial-gradient(900px 500px at 90% 90%, rgba(99, 102, 241, 0.06), transparent 6%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      color: #e6eef8;
      padding: 24px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 560px;
      gap: 24px;
      align-items: start;
    }

    /* Calculator Panel */
    .calculator-wrapper {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.85), rgba(12, 18, 30, 0.6));
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.08);
      backdrop-filter: blur(4px);
    }

    .calculator-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .ai-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      font-size: 0.75rem;
    }

    .ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .display {
      padding: 16px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.3);
      margin: 12px 0;
    }

    .expression {
      min-height: 28px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: right;
      word-break: break-word;
    }

    .result {
      font-size: 2.2rem;
      font-weight: 700;
      text-align: right;
      color: #e6eef8;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .btn {
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(10, 14, 20, 0.95));
      color: #e6eef8;
      transition: transform 0.1s;
    }

    .btn:active { transform: translateY(2px); }
    .btn-operator { background: linear-gradient(180deg, #4f46e5, #6366f1); color: white; }
    .btn-ac { background: linear-gradient(180deg, #dc2626, #b91c1c); }
    .btn-equal { background: linear-gradient(135deg, #22c55e, #16a34a); grid-column: span 2; }

    /* Scanner Panel */
    .scanner-panel {
      background: linear-gradient(180deg, rgba(8, 12, 20, 0.7), rgba(10, 14, 24, 0.55));
      border-radius: 24px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scan-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .scan-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .scan-btn:hover { transform: scale(1.02); }

    .camera-controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .cam-btn { background: #334155; border: none; padding: 8px 16px; border-radius: 24px; color: white; cursor: pointer; font-size: 0.75rem; font-weight: 500; }

    .file-input-hidden { display: none; }

    .preview-area {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 16px;
      padding: 12px;
      margin: 12px 0;
      max-height: 200px;
      overflow: auto;
      border: 1px solid rgba(99, 102, 241, 0.4);
    }

    .extracted-text {
      font-size: 0.85rem;
      color: #e2e8f0;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      background: #0a0f1a;
      padding: 8px;
      border-radius: 8px;
    }

    /* Multi-interpretation cards */
    .interpretations-container {
      margin: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .interpret-card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95));
      border-radius: 16px;
      padding: 14px;
      border-left: 4px solid var(--accent);
      cursor: pointer;
      transition: all 0.2s ease;
      animation: fadeInUp 0.3s ease;
    }

    .interpret-card:hover {
      transform: translateX(5px);
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.15));
      border-left-color: var(--purple-glow);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .interpret-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .interpret-badge {
      background: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .interpret-text {
      font-size: 1rem;
      font-weight: 500;
      color: #f1f5f9;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .interpret-solution {
      font-size: 0.85rem;
      color: #86efac;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
    }

    .choose-btn {
      background: var(--success);
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      color: white;
      font-weight: 600;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.1s;
    }

    .choose-btn:hover {
      transform: scale(1.05);
      background: #16a34a;
    }

    .answer-area {
      background: rgba(15, 23, 42, 0.7);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      border-left: 4px solid var(--success);
    }

    .subject-badge {
      display: inline-block;
      background: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-bottom: 10px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .ocr-progress {
      background: #1e293b;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.7rem;
      margin: 8px 0;
    }

    .history-list {
      max-height: 180px;
      overflow-y: auto;
      margin-top: 12px;
    }

    .history-item {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid rgba(148,163,184,0.1);
    }

    .camera-preview {
      width: 100%;
      border-radius: 16px;
      margin: 8px 0;
      background: #000;
      display: none;
    }

    .image-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 12px;
      margin: 8px 0;
    }

    @media (max-width: 1000px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Calculator -->
  <div class="calculator-wrapper">
    <div class="calculator-header">
      <span style="color: var(--muted);">Smart Calculator</span>
      <div class="ai-pill"><div class="ai-dot"></div> AI Core</div>
    </div>
    <div class="display">
      <div id="calcExpr" class="expression"></div>
      <div id="calcRes" class="result">0</div>
    </div>
    <div class="keypad">
      <button class="btn btn-ac" data-cmd="ac">AC</button>
      <button class="btn" data-cmd="back">⌫</button>
      <button class="btn" data-val="(">(</button>
      <button class="btn btn-operator" data-val="/">÷</button>
      <button class="btn" data-val="7">7</button><button class="btn" data-val="8">8</button><button class="btn" data-val="9">9</button>
      <button class="btn btn-operator" data-val="*">×</button>
      <button class="btn" data-val="4">4</button><button class="btn" data-val="5">5</button><button class="btn" data-val="6">6</button>
      <button class="btn btn-operator" data-val="-">−</button>
      <button class="btn" data-val="1">1</button><button class="btn" data-val="2">2</button><button class="btn" data-val="3">3</button>
      <button class="btn btn-operator" data-val="+">+</button>
      <button class="btn" data-val="%">%</button>
      <button class="btn" data-val="0">0</button>
      <button class="btn" data-val=".">.</button>
      <button class="btn btn-equal" data-cmd="equal">=</button>
      <button class="btn" data-val="ans">ans</button>
      <button class="btn" data-cmd="pm">+/−</button>
      <button class="btn" data-val=")">)</button>
    </div>
    <div id="calcHistory" class="history-list"></div>
  </div>

  <!-- Scanner Panel with Multi-Interpretation -->
  <div class="scanner-panel">
    <div class="panel-header">
      <h3 style="color: #c7d2fe;">✍️ Handwriting AI Scanner</h3>
      <div class="scan-buttons">
        <button id="cameraBtn" class="scan-btn">📷 Take Photo</button>
        <button id="uploadBtn" class="scan-btn">📁 Upload Image</button>
      </div>
    </div>
    
    <input type="file" id="fileInput" class="file-input-hidden" accept="image/*" />
    <video id="cameraVideo" class="camera-preview" autoplay playsinline></video>
    <div id="cameraControls" style="display: none; gap: 10px; margin: 8px 0; flex-wrap: wrap;">
      <button id="switchCameraBtn" class="cam-btn">🔄 Switch Camera</button>
      <button id="capturePhotoBtn" class="cam-btn" style="background: #22c55e;">📸 Capture & Read</button>
      <button id="closeCameraBtn" class="cam-btn" style="background: #ef4444;">✖ Close</button>
    </div>
    <canvas id="photoCanvas" style="display: none;"></canvas>
    <div id="imagePreviewContainer" style="display: none;">
      <img id="imagePreview" class="image-preview" />
    </div>
    
    <div id="previewArea" class="preview-area" style="display: none;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <span>📄 Raw OCR Text</span>
        <button id="clearPreview" style="background: none; border: none; color: #ef4444; cursor: pointer;">✖</button>
      </div>
      <div id="extractedTextDisplay" class="extracted-text"></div>
    </div>

    <!-- Multi-interpretation options will appear here -->
    <div id="interpretationsContainer" class="interpretations-container"></div>

    <div id="answerArea" class="answer-area" style="display: none;">
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;">
        <span class="subject-badge" id="subjectTag">✅ Selected Solution</span>
      </div>
      <div id="aiAnswer"></div>
      <div id="stepByStep" style="margin-top: 12px; font-size: 0.8rem; color: #94a3b8;"></div>
    </div>

    <div style="margin-top: 16px;">
      <div style="font-size: 0.75rem; color: #6b7280;">📌 Recent Scans</div>
      <div id="scanHistory" class="history-list"></div>
    </div>
  </div>
</div>

<script>
  // ======================== CALCULATOR LOGIC ========================
  let calcExpr = "";
  let lastAnsVal = 0;
  let calcHistory = [];

  function formatNum(n) { if (!isFinite(n)) return String(n); if (Math.abs(n - Math.round(n)) < 1e-12) return String(Math.round(n)); return String(Number(n.toFixed(10))).replace(/\.?0+$/, ""); }
  function safeEval(expr) {
    let s = expr.replace(/÷/g, "/").replace(/×/g, "*").replace(/−/g, "-").replace(/(\d)\(/g, "$1*(").replace(/\)(\d)/g, ")*$1");
    s = s.replace(/\bans\b/gi, `(${lastAnsVal})`);
    s = s.replace(/[^0-9+\-*/%.()]/g, "");
    if (!s.trim()) return "";
    try { let v = Function('"use strict"; return (' + s + ')')(); return (typeof v === "number" && isFinite(v)) ? v : ""; } catch(e) { return ""; }
  }
  function updateCalc() {
    document.getElementById("calcExpr").textContent = calcExpr || "";
    let val = safeEval(calcExpr);
    document.getElementById("calcRes").textContent = val === "" ? "0" : formatNum(val);
  }
  function addCalcHistory(e, r) { calcHistory.unshift({ expr: e, result: formatNum(r) }); if(calcHistory.length > 30) calcHistory.pop(); renderCalcHistory(); }
  function renderCalcHistory() {
    let div = document.getElementById("calcHistory"); div.innerHTML = "";
    for(let h of calcHistory.slice(0,20)) { let item = document.createElement("div"); item.className = "history-item"; item.innerHTML = `${h.expr} = ${h.result}`; item.onclick = () => { calcExpr = h.expr; updateCalc(); }; div.appendChild(item); }
  }
  function handleCalc(v) {
    if(v === "ans") { let last = calcExpr.slice(-1); if(last && /[\d\)]/i.test(last)) calcExpr += "*"; calcExpr += "ans"; updateCalc(); return; }
    if(v === "+-") { let m = calcExpr.match(/(.*?)([-+]?\d*\.?\d+|\bans\b)$/i); if(m) { let b = m[1]||"", t = m[2]; if(t.startsWith("-")) calcExpr = b + t.slice(1); else calcExpr = b + "-" + t; } else calcExpr += "-"; updateCalc(); return; }
    if(v === "(") { let last = calcExpr.slice(-1); if(last && /[\d\)a-z]/i.test(last)) calcExpr += "*"; calcExpr += "("; updateCalc(); return; }
    if(v === ")") { calcExpr += ")"; updateCalc(); return; }
    if(v === ".") { let lastNum = calcExpr.match(/(\d*\.?\d+)$/); if(lastNum && lastNum[0].includes(".")) return; calcExpr += "."; updateCalc(); return; }
    if(["+","-","*","/","%"].includes(v)) { let last = calcExpr.slice(-1); if(v === "-" && (calcExpr === "" || last === "" || "+-*/%(".includes(last))) { calcExpr += "-"; updateCalc(); return; } if("+-*/%".includes(last)) calcExpr = calcExpr.slice(0,-1) + v; else calcExpr += v; updateCalc(); return; }
    calcExpr += v; updateCalc();
  }
  function calcEquals() { let v = safeEval(calcExpr); if(v !== "") { lastAnsVal = v; addCalcHistory(calcExpr, v); calcExpr = formatNum(v); updateCalc(); } }
  document.querySelectorAll(".keypad .btn").forEach(btn => { btn.onclick = () => { let val = btn.getAttribute("data-val"); let cmd = btn.getAttribute("data-cmd"); if(val) handleCalc(val); else if(cmd === "ac") { calcExpr = ""; updateCalc(); } else if(cmd === "back") { calcExpr = calcExpr.slice(0,-1); updateCalc(); } else if(cmd === "equal") calcEquals(); else if(cmd === "pm") handleCalc("+-"); }; });
  updateCalc(); renderCalcHistory();

  // ======================== HANDWRITING OCR WITH MULTI-INTERPRETATION ========================
  let scanHistory = [];
  let currentStream = null;
  let currentFacingMode = "environment";

  // Generate multiple interpretations from ambiguous handwriting
  function generateInterpretations(rawText) {
    const interpretations = [];
    const original = rawText.trim();
    
    // Character substitution patterns for common handwriting confusions
    const substitutions = {
      '0': ['O', 'Q', 'D', 'C'],
      '1': ['I', 'l', '|', '7'],
      '2': ['Z', 'z'],
      '3': ['8', 'B', 'E'],
      '4': ['A', 'H'],
      '5': ['S', 's'],
      '6': ['G', 'b'],
      '7': ['1', 'T', 't'],
      '8': ['3', 'B', '&'],
      '9': ['g', 'q'],
      'O': ['0', 'Q', 'D'],
      'I': ['1', 'l', '|'],
      'l': ['1', 'I'],
      'S': ['5', 's'],
      's': ['5', 'S'],
      'B': ['8', '3'],
      'Z': ['2'],
      '+': ['t', 'T', '✝'],
      '-': ['—', '_', '–'],
      'x': ['×', 'X', '*'],
      '/': ['|', '1'],
      '=': ['-', '—']
    };
    
    // Add original interpretation
    interpretations.push({
      id: 0,
      originalText: original,
      cleanedText: original,
      type: "raw",
      description: "📝 Original OCR reading"
    });
    
    // Try character corrections for numbers and math
    let corrected = original;
    for (let i = 0; i < corrected.length; i++) {
      const char = corrected[i];
      if (substitutions[char]) {
        for (let sub of substitutions[char].slice(0, 2)) {
          let variant = corrected.slice(0, i) + sub + corrected.slice(i + 1);
          if (!interpretations.some(i => i.cleanedText === variant)) {
            interpretations.push({
              id: interpretations.length,
              originalText: original,
              cleanedText: variant,
              type: "corrected",
              description: `🔧 Corrected '${char}' → '${sub}'`
            });
          }
        }
      }
    }
    
    // Try common handwriting patterns: "1+1" misread as "1+]" etc
    if (original.includes(']') && !original.includes('+')) {
      let variant = original.replace(/\]/g, '+');
      if (!interpretations.some(i => i.cleanedText === variant)) {
        interpretations.push({
          id: interpretations.length,
          originalText: original,
          cleanedText: variant,
          type: "corrected",
          description: "✏️ ']' interpreted as '+'"
        });
      }
    }
    if (original.includes('[')) {
      let variant = original.replace(/\[/g, '(');
      if (!interpretations.some(i => i.cleanedText === variant)) {
        interpretations.push({
          id: interpretations.length,
          originalText: original,
          cleanedText: variant,
          type: "corrected",
          description: "✏️ '[' interpreted as '('"
        });
      }
    }
    
    // Try removing common OCR artifacts
    let cleanedNoArtifacts = original.replace(/[^a-zA-Z0-9+\-*/=().,?%]/g, ' ').replace(/\s+/g, ' ').trim();
    if (cleanedNoArtifacts !== original && !interpretations.some(i => i.cleanedText === cleanedNoArtifacts)) {
      interpretations.push({
        id: interpretations.length,
        originalText: original,
        cleanedText: cleanedNoArtifacts,
        type: "cleaned",
        description: "🧹 Removed artifacts & special characters"
      });
    }
    
    // Try numeric extraction for math problems
    let numbers = original.match(/\d+/g);
    if (numbers && numbers.length >= 2) {
      let mathVariants = [];
      // Try addition
      if (numbers.length === 2) {
        mathVariants.push(`${numbers[0]}+${numbers[1]}`);
        mathVariants.push(`${numbers[0]}-${numbers[1]}`);
        mathVariants.push(`${numbers[0]}*${numbers[1]}`);
        if (numbers[1] !== '0') mathVariants.push(`${numbers[0]}/${numbers[1]}`);
      }
      for (let variant of mathVariants.slice(0, 3)) {
        if (!interpretations.some(i => i.cleanedText === variant)) {
          interpretations.push({
            id: interpretations.length,
            originalText: original,
            cleanedText: variant,
            type: "math",
            description: `🧮 Math interpretation: ${variant}`
          });
        }
      }
    }
    
    // Add a few more variations with common word substitutions
    if (original.toLowerCase().includes('prime') || original.toLowerCase().includes('pr1me') || original.toLowerCase().includes('pr1m3')) {
      interpretations.push({
        id: interpretations.length,
        originalText: original,
        cleanedText: "first prime number",
        type: "keyword",
        description: "🔢 Detected prime number question"
      });
    }
    
    if (original.toLowerCase().includes('med') || original.toLowerCase().includes('med1an')) {
      interpretations.push({
        id: interpretations.length,
        originalText: original,
        cleanedText: "median",
        type: "keyword",
        description: "📊 Detected median calculation"
      });
    }
    
    if (original.toLowerCase().includes('tri') || original.toLowerCase().includes('ang')) {
      interpretations.push({
        id: interpretations.length,
        originalText: original,
        cleanedText: "triangle area",
        type: "keyword",
        description: "📐 Detected triangle geometry"
      });
    }
    
    // Limit to 8 interpretations
    return interpretations.slice(0, 8);
  }
  
  // Solve based on cleaned text
  function solveInterpretation(cleanedText) {
    const text = cleanedText.toLowerCase().trim();
    
    // Check for simple arithmetic
    let mathMatch = text.match(/(\d+\s*[\+\-\*\/]\s*\d+)/);
    if (mathMatch) {
      try {
        let expr = mathMatch[1].replace(/×/g, '*').replace(/÷/g, '/');
        let result = Function('"use strict"; return (' + expr + ')')();
        if (isFinite(result)) {
          return { solution: `${mathMatch[1]} = ${formatNum(result)}`, steps: `Direct calculation: ${formatNum(result)}`, subject: "🧮 Mathematics" };
        }
      } catch(e) {}
    }
    
    // First prime
    if (text.includes('first prime') || text.includes('1st prime') || text.includes('prime number') && text.includes('first')) {
      return { solution: "The first prime number is 2.", steps: "Prime numbers: 2, 3, 5, 7, 11... 2 is the smallest and only even prime.", subject: "📐 Mathematics" };
    }
    
    // Prime check
    let primeMatch = text.match(/(\d+)\s*prime/);
    if (primeMatch) {
      let n = parseInt(primeMatch[1]);
      let isP = isPrimeNum(n);
      return { solution: `${n} is ${isP ? "✅ a prime number" : "❌ not prime"}`, steps: isP ? `No divisors other than 1 and ${n}.` : `Has factors other than 1 and itself.`, subject: "📐 Mathematics" };
    }
    
    // Median
    if (text.includes('median')) {
      let nums = extractNumbers(text);
      if (nums.length) {
        let med = calculateMedian(nums);
        return { solution: `Median = ${med}`, steps: `Numbers: [${nums.join(", ")}] → Median = ${med}`, subject: "📐 Mathematics" };
      }
    }
    
    // Triangle area
    if (text.includes('triangle') || text.includes('area')) {
      let nums = extractNumbers(text);
      if (nums.length >= 2) {
        let area = 0.5 * nums[0] * nums[1];
        return { solution: `Triangle Area = ${area}`, steps: `Area = ½ × ${nums[0]} × ${nums[1]} = ${area}`, subject: "📐 Mathematics" };
      }
      if (nums.length >= 3) {
        let a = nums[0], b = nums[1], c = nums[2];
        let s = (a + b + c) / 2;
        let area = Math.sqrt(Math.max(0, s * (s - a) * (s - b) * (s - c)));
        return { solution: `Triangle Area = ${area.toFixed(4)}`, steps: `Heron's formula with sides ${a}, ${b}, ${c}`, subject: "📐 Mathematics" };
      }
    }
    
    // Linear equation
    let eqMatch = text.match(/(\d*)x\s*([+-]\s*\d+)?\s*=\s*(\d+)/i);
    if (eqMatch) {
      let a = eqMatch[1] ? parseFloat(eqMatch[1]) : 1;
      let b = eqMatch[2] ? parseFloat(eqMatch[2].replace(/\s/g, "")) : 0;
      let c = parseFloat(eqMatch[3]);
      let x = (c - b) / a;
      return { solution: `x = ${formatNum(x)}`, steps: `${a}x + ${b} = ${c} → x = ${formatNum(x)}`, subject: "📐 Mathematics" };
    }
    
    // Check for direct numbers
    let numbers = extractNumbers(text);
    if (numbers.length === 2 && text.includes('+')) {
      return { solution: `${numbers[0]} + ${numbers[1]} = ${numbers[0] + numbers[1]}`, steps: `Addition result`, subject: "🧮 Mathematics" };
    }
    
    return { solution: `Interpreted as: "${cleanedText}"`, steps: "Please select another interpretation if this isn't what you meant.", subject: "📝 Text" };
  }
  
  function isPrimeNum(n) { if(n<2) return false; if(n===2) return true; if(n%2===0) return false; for(let i=3;i<=Math.sqrt(n);i+=2) if(n%i===0) return false; return true; }
  function extractNumbers(str) { let nums = []; str.replace(/-?\d+(\.\d+)?/g, m => nums.push(parseFloat(m))); return nums; }
  function calculateMedian(nums) { let s = [...nums].sort((a,b)=>a-b); let m = Math.floor(s.length/2); return s.length%2===0 ? (s[m-1]+s[m])/2 : s[m]; }
  
  // Enhanced image preprocessing
  async function preprocessImage(imageBlob) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const maxDim = 2000;
        if (w > maxDim || h > maxDim) {
          const scale = maxDim / Math.max(w, h);
          w = Math.floor(w * scale);
          h = Math.floor(h * scale);
        }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        
        // Enhance contrast
        const imageData = ctx.getImageData(0, 0, w, h);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
          gray = gray < 100 ? Math.max(0, gray * 0.8) : Math.min(255, gray * 1.2);
          data[i] = data[i+1] = data[i+2] = gray;
        }
        ctx.putImageData(imageData, 0, 0);
        canvas.toBlob(resolve, 'image/png');
      };
      img.src = URL.createObjectURL(imageBlob);
    });
  }
  
  async function performOCR(imageBlob) {
    const progressSpan = document.getElementById("ocrProgressText");
    if (progressSpan) progressSpan.textContent = "🔄 Enhancing image...";
    
    const enhanced = await preprocessImage(imageBlob);
    
    if (progressSpan) progressSpan.textContent = "🔍 Reading handwriting...";
    
    const worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (progressSpan && m.status === 'recognizing text') {
          progressSpan.textContent = `📖 Reading: ${Math.round(m.progress * 100)}%`;
        }
      }
    });
    
    await worker.setParameters({
      tessedit_pageseg_mode: '6',
      preserve_interword_spaces: '1'
    });
    
    const { data: { text } } = await worker.recognize(enhanced);
    await worker.terminate();
    
    if (progressSpan) progressSpan.textContent = "✅ Complete!";
    setTimeout(() => { if (progressSpan) progressSpan.textContent = ""; }, 1500);
    
    return text.trim();
  }
  
  async function processImageFile(file) {
    const loadingSpan = document.getElementById("loadingIndicator");
    if (loadingSpan) {
      loadingSpan.style.display = "inline-block";
      loadingSpan.innerHTML = "<div class='loading'></div>";
    }
    
    // Show preview
    const previewImg = document.getElementById("imagePreview");
    const previewContainer = document.getElementById("imagePreviewContainer");
    const imgUrl = URL.createObjectURL(file);
    previewImg.src = imgUrl;
    previewContainer.style.display = "block";
    
    try {
      const rawText = await performOCR(file);
      
      document.getElementById("previewArea").style.display = "block";
      document.getElementById("extractedTextDisplay").innerHTML = escapeHtml(rawText.slice(0, 500)) + (rawText.length > 500 ? "..." : "");
      
      // Generate multiple interpretations
      const interpretations = generateInterpretations(rawText);
      
      // Display interpretations for user to choose
      const container = document.getElementById("interpretationsContainer");
      container.innerHTML = `<div style="margin-bottom: 12px; font-size: 0.85rem; color: #a5b4fc;">🔍 I found ${interpretations.length} possible interpretations. Click "Choose" on the one you meant:</div>`;
      
      interpretations.forEach((interp, idx) => {
        const solved = solveInterpretation(interp.cleanedText);
        const card = document.createElement("div");
        card.className = "interpret-card";
        card.innerHTML = `
          <div class="interpret-header">
            <span class="interpret-badge">Option ${idx + 1}</span>
            <span style="font-size: 0.7rem; color: #86efac;">${interp.description}</span>
          </div>
          <div class="interpret-text">“${escapeHtml(interp.cleanedText)}”</div>
          <div class="interpret-solution">💡 ${escapeHtml(solved.solution)}</div>
          <div style="margin-top: 10px; text-align: right;">
            <button class="choose-btn" data-interpret='${JSON.stringify(interp)}' data-solution='${JSON.stringify(solved)}'>✓ This is what I meant</button>
          </div>
        `;
        container.appendChild(card);
      });
      
      // Add choose button handlers
      document.querySelectorAll('.choose-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const interp = JSON.parse(btn.getAttribute('data-interpret'));
          const solved = JSON.parse(btn.getAttribute('data-solution'));
          selectInterpretation(interp, solved, rawText);
        });
      });
      
      // Hide answer area until selection
      document.getElementById("answerArea").style.display = "none";
      
      // Add to scan history
      scanHistory.unshift({ name: file.name.slice(0, 25), preview: rawText.slice(0, 50), interpretations: interpretations.length });
      if(scanHistory.length > 15) scanHistory.pop();
      renderScanHistory();
      
    } catch(e) {
      console.error(e);
      document.getElementById("interpretationsContainer").innerHTML = `<div style="color: #ef4444;">⚠️ OCR failed. Please ensure the image has clear, well-lit handwriting.</div>`;
    }
    
    if (loadingSpan) loadingSpan.style.display = "none";
    URL.revokeObjectURL(imgUrl);
  }
  
  function selectInterpretation(interpretation, solved, originalRaw) {
    document.getElementById("answerArea").style.display = "block";
    document.getElementById("subjectTag").innerHTML = solved.subject;
    document.getElementById("aiAnswer").innerHTML = `<strong>🎓 Selected: "${escapeHtml(interpretation.cleanedText)}"</strong><br><br>${escapeHtml(solved.solution)}`;
    document.getElementById("stepByStep").innerHTML = `<span style="color: #a5b4fc;">📖 ${escapeHtml(solved.steps)}</span>`;
    
    // Update lastAns if numeric result
    let numMatch = solved.solution.match(/-?\d+(\.\d+)?/);
    if (numMatch) lastAnsVal = parseFloat(numMatch[0]);
    
    // Scroll to answer
    document.getElementById("answerArea").scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  
  function renderScanHistory() {
    let container = document.getElementById("scanHistory");
    if (!container) return;
    container.innerHTML = "";
    for(let item of scanHistory.slice(0, 10)) {
      let div = document.createElement("div");
      div.className = "history-item";
      div.innerHTML = `<span>📎 ${escapeHtml(item.name)}</span><span style="color: #86efac;"> → ${escapeHtml(item.preview)}</span>`;
      div.onclick = () => { alert("Re-scan this image to see interpretations again"); };
      container.appendChild(div);
    }
  }
  
  function escapeHtml(s) { return String(s).replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
  
  // ======================== CAMERA CONTROLS ========================
  const video = document.getElementById("cameraVideo");
  const canvas = document.getElementById("photoCanvas");
  const cameraControls = document.getElementById("cameraControls");
  let currentStreamActive = false;
  
  async function startCamera(facingMode = "environment") {
    if (currentStreamActive && currentStream) currentStream.getTracks().forEach(t => t.stop());
    try {
      const constraints = { video: { facingMode: { exact: facingMode } } };
      currentStream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = currentStream;
      video.style.display = "block";
      cameraControls.style.display = "flex";
      currentStreamActive = true;
    } catch(err) {
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = currentStream;
        video.style.display = "block";
        cameraControls.style.display = "flex";
        currentStreamActive = true;
      } catch(e) { alert("Camera access denied. Please allow camera permissions."); }
    }
  }
  
  function stopCamera() {
    if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
    video.style.display = "none";
    cameraControls.style.display = "none";
    currentStreamActive = false;
  }
  
  function captureAndProcess() {
    if (!video.videoWidth) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(async (blob) => {
      const file = new File([blob], "captured-handwriting.jpg", { type: "image/jpeg" });
      await processImageFile(file);
      stopCamera();
    }, "image/jpeg");
  }
  
  document.getElementById("cameraBtn").onclick = async () => { currentFacingMode = "environment"; await startCamera("environment"); };
  document.getElementById("switchCameraBtn").onclick = async () => { currentFacingMode = currentFacingMode === "environment" ? "user" : "environment"; await startCamera(currentFacingMode); };
  document.getElementById("capturePhotoBtn").onclick = captureAndProcess;
  document.getElementById("closeCameraBtn").onclick = stopCamera;
  document.getElementById("uploadBtn").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange = async (e) => { if (e.target.files.length) await processImageFile(e.target.files[0]); };
  document.getElementById("clearPreview").onclick = () => document.getElementById("previewArea").style.display = "none";
  
  renderScanHistory();
</script>
