<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Handwriting AI Pro | Multi-Interpretation Solver</title>
  <!-- Tesseract.js for OCR -->
  <script src="https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --bg1: #071026;
      --bg2: #0b1220;
      --muted: #9ca3af;
      --accent: #6366f1;
      --accent2: #60a5fa;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(96, 165, 250, 0.08), transparent 8%),
                  radial-gradient(900px 500px at 90% 90%, rgba(99, 102, 241, 0.06), transparent 6%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      color: #e6eef8;
      padding: 24px;
    }

    .container {
      max-width: 1500px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 540px;
      gap: 24px;
      align-items: start;
    }

    /* Calculator Panel */
    .calculator-wrapper {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.85), rgba(12, 18, 30, 0.6));
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.08);
      backdrop-filter: blur(4px);
    }

    .calculator-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .ai-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      font-size: 0.75rem;
    }

    .ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .display {
      padding: 16px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.3);
      margin: 12px 0;
    }

    .expression {
      min-height: 28px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: right;
      word-break: break-word;
    }

    .result {
      font-size: 2.2rem;
      font-weight: 700;
      text-align: right;
      color: #e6eef8;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .btn {
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(10, 14, 20, 0.95));
      color: #e6eef8;
      transition: transform 0.1s;
    }

    .btn:active { transform: translateY(2px); }
    .btn-operator { background: linear-gradient(180deg, #4f46e5, #6366f1); color: white; }
    .btn-ac { background: linear-gradient(180deg, #dc2626, #b91c1c); }
    .btn-equal { background: linear-gradient(135deg, #22c55e, #16a34a); grid-column: span 2; }

    /* Scanner Panel */
    .scanner-panel {
      background: linear-gradient(180deg, rgba(8, 12, 20, 0.7), rgba(10, 14, 24, 0.55));
      border-radius: 24px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scan-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .scan-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .scan-btn:hover { transform: scale(1.02); }

    .camera-controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .cam-btn { background: #334155; border: none; padding: 8px 16px; border-radius: 24px; color: white; cursor: pointer; font-size: 0.75rem; font-weight: 500; }

    .file-input-hidden { display: none; }

    .preview-area {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 16px;
      padding: 12px;
      margin: 12px 0;
      max-height: 200px;
      overflow: auto;
      border: 1px solid rgba(99, 102, 241, 0.4);
    }

    .extracted-text {
      font-size: 0.85rem;
      color: #e2e8f0;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      background: #0a0f1a;
      padding: 8px;
      border-radius: 8px;
    }

    /* Multi-interpretation Cards */
    .interpretations-container {
      margin: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .interpret-card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.8));
      border-radius: 16px;
      padding: 14px;
      border-left: 4px solid var(--accent);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .interpret-card:hover {
      transform: translateX(4px);
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(15, 23, 42, 0.9));
      border-left-color: var(--success);
    }

    .interpret-card.selected {
      border-left-color: var(--success);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(15, 23, 42, 0.9));
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
    }

    .interpret-original {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .interpret-question {
      font-size: 1rem;
      font-weight: 600;
      color: #e6eef8;
      margin-bottom: 8px;
    }

    .interpret-answer {
      font-size: 0.9rem;
      color: #86efac;
      margin-bottom: 8px;
    }

    .interpret-steps {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .confidence-badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.3);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.65rem;
      margin-left: 8px;
    }

    .answer-area {
      background: rgba(15, 23, 42, 0.7);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }

    .subject-badge {
      display: inline-block;
      background: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-bottom: 10px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .history-list {
      max-height: 180px;
      overflow-y: auto;
      margin-top: 12px;
    }

    .history-item {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid rgba(148,163,184,0.1);
    }

    .camera-preview {
      width: 100%;
      border-radius: 16px;
      margin: 8px 0;
      background: #000;
      display: none;
    }

    .image-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 12px;
      margin: 8px 0;
    }

    @media (max-width: 1000px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Calculator -->
  <div class="calculator-wrapper">
    <div class="calculator-header">
      <span style="color: var(--muted);">Smart Calculator</span>
      <div class="ai-pill"><div class="ai-dot"></div> AI Core</div>
    </div>
    <div class="display">
      <div id="calcExpr" class="expression"></div>
      <div id="calcRes" class="result">0</div>
    </div>
    <div class="keypad">
      <button class="btn btn-ac" data-cmd="ac">AC</button>
      <button class="btn" data-cmd="back">⌫</button>
      <button class="btn" data-val="(">(</button>
      <button class="btn btn-operator" data-val="/">÷</button>
      <button class="btn" data-val="7">7</button><button class="btn" data-val="8">8</button><button class="btn" data-val="9">9</button>
      <button class="btn btn-operator" data-val="*">×</button>
      <button class="btn" data-val="4">4</button><button class="btn" data-val="5">5</button><button class="btn" data-val="6">6</button>
      <button class="btn btn-operator" data-val="-">−</button>
      <button class="btn" data-val="1">1</button><button class="btn" data-val="2">2</button><button class="btn" data-val="3">3</button>
      <button class="btn btn-operator" data-val="+">+</button>
      <button class="btn" data-val="%">%</button>
      <button class="btn" data-val="0">0</button>
      <button class="btn" data-val=".">.</button>
      <button class="btn btn-equal" data-cmd="equal">=</button>
      <button class="btn" data-val="ans">ans</button>
      <button class="btn" data-cmd="pm">+/−</button>
      <button class="btn" data-val=")">)</button>
    </div>
    <div id="calcHistory" class="history-list"></div>
  </div>

  <!-- Scanner Panel with Multi-Interpretation -->
  <div class="scanner-panel">
    <div class="panel-header">
      <h3 style="color: #c7d2fe;">✍️ Handwriting AI | Multi-Interpretation</h3>
      <div class="scan-buttons">
        <button id="cameraBtn" class="scan-btn">📷 Take Photo</button>
        <button id="uploadBtn" class="scan-btn">📁 Upload Image</button>
      </div>
    </div>
    
    <input type="file" id="fileInput" class="file-input-hidden" accept="image/*" />
    <video id="cameraVideo" class="camera-preview" autoplay playsinline></video>
    <div id="cameraControls" style="display: none; gap: 10px; margin: 8px 0; flex-wrap: wrap;">
      <button id="switchCameraBtn" class="cam-btn">🔄 Switch Camera</button>
      <button id="capturePhotoBtn" class="cam-btn" style="background: #22c55e;">📸 Capture</button>
      <button id="closeCameraBtn" class="cam-btn" style="background: #ef4444;">✖ Close</button>
    </div>
    <canvas id="photoCanvas" style="display: none;"></canvas>
    <div id="imagePreviewContainer" style="display: none;">
      <img id="imagePreview" class="image-preview" />
    </div>
    
    <div id="previewArea" class="preview-area" style="display: none;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <span>📄 OCR Raw Text</span>
        <button id="clearPreview" style="background: none; border: none; color: #ef4444; cursor: pointer;">✖</button>
      </div>
      <div id="extractedTextDisplay" class="extracted-text"></div>
    </div>

    <!-- Multiple Interpretations Section -->
    <div id="interpretationsContainer" class="interpretations-container"></div>

    <div id="answerArea" class="answer-area">
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;">
        <span class="subject-badge" id="subjectTag">🎯 Selected Answer</span>
        <span id="loadingIndicator" style="display: none;"></span>
        <span id="ocrProgressText" style="font-size: 0.7rem; color: #86efac;"></span>
      </div>
      <div id="aiAnswer">✨ Take a photo or upload an image of handwriting — I'll generate multiple interpretations of what you wrote, and you click the one you meant!</div>
      <div id="stepByStep" style="margin-top: 12px; font-size: 0.8rem; color: #94a3b8;"></div>
    </div>

    <div style="margin-top: 16px;">
      <div style="font-size: 0.75rem; color: #6b7280;">📌 Recent Scans</div>
      <div id="scanHistory" class="history-list"></div>
    </div>
  </div>
</div>

<script>
  // ======================== CALCULATOR LOGIC ========================
  let calcExpr = "";
  let lastAnsVal = 0;
  let calcHistory = [];

  function formatNum(n) { if (!isFinite(n)) return String(n); if (Math.abs(n - Math.round(n)) < 1e-12) return String(Math.round(n)); return String(Number(n.toFixed(10))).replace(/\.?0+$/, ""); }
  function safeEval(expr) {
    let s = expr.replace(/÷/g, "/").replace(/×/g, "*").replace(/−/g, "-").replace(/(\d)\(/g, "$1*(").replace(/\)(\d)/g, ")*$1");
    s = s.replace(/\bans\b/gi, `(${lastAnsVal})`);
    s = s.replace(/[^0-9+\-*/%.()]/g, "");
    if (!s.trim()) return "";
    try { let v = Function('"use strict"; return (' + s + ')')(); return (typeof v === "number" && isFinite(v)) ? v : ""; } catch(e) { return ""; }
  }
  function updateCalc() {
    document.getElementById("calcExpr").textContent = calcExpr || "";
    let val = safeEval(calcExpr);
    document.getElementById("calcRes").textContent = val === "" ? "0" : formatNum(val);
  }
  function addCalcHistory(e, r) { calcHistory.unshift({ expr: e, result: formatNum(r) }); if(calcHistory.length > 30) calcHistory.pop(); renderCalcHistory(); }
  function renderCalcHistory() {
    let div = document.getElementById("calcHistory"); div.innerHTML = "";
    for(let h of calcHistory.slice(0,20)) { let item = document.createElement("div"); item.className = "history-item"; item.innerHTML = `${h.expr} = ${h.result}`; item.onclick = () => { calcExpr = h.expr; updateCalc(); }; div.appendChild(item); }
  }
  function handleCalc(v) {
    if(v === "ans") { let last = calcExpr.slice(-1); if(last && /[\d\)]/i.test(last)) calcExpr += "*"; calcExpr += "ans"; updateCalc(); return; }
    if(v === "+-") { let m = calcExpr.match(/(.*?)([-+]?\d*\.?\d+|\bans\b)$/i); if(m) { let b = m[1]||"", t = m[2]; if(t.startsWith("-")) calcExpr = b + t.slice(1); else calcExpr = b + "-" + t; } else calcExpr += "-"; updateCalc(); return; }
    if(v === "(") { let last = calcExpr.slice(-1); if(last && /[\d\)a-z]/i.test(last)) calcExpr += "*"; calcExpr += "("; updateCalc(); return; }
    if(v === ")") { calcExpr += ")"; updateCalc(); return; }
    if(v === ".") { let lastNum = calcExpr.match(/(\d*\.?\d+)$/); if(lastNum && lastNum[0].includes(".")) return; calcExpr += "."; updateCalc(); return; }
    if(["+","-","*","/","%"].includes(v)) { let last = calcExpr.slice(-1); if(v === "-" && (calcExpr === "" || last === "" || "+-*/%(".includes(last))) { calcExpr += "-"; updateCalc(); return; } if("+-*/%".includes(last)) calcExpr = calcExpr.slice(0,-1) + v; else calcExpr += v; updateCalc(); return; }
    calcExpr += v; updateCalc();
  }
  function calcEquals() { let v = safeEval(calcExpr); if(v !== "") { lastAnsVal = v; addCalcHistory(calcExpr, v); calcExpr = formatNum(v); updateCalc(); } }
  document.querySelectorAll(".keypad .btn").forEach(btn => { btn.onclick = () => { let val = btn.getAttribute("data-val"); let cmd = btn.getAttribute("data-cmd"); if(val) handleCalc(val); else if(cmd === "ac") { calcExpr = ""; updateCalc(); } else if(cmd === "back") { calcExpr = calcExpr.slice(0,-1); updateCalc(); } else if(cmd === "equal") calcEquals(); else if(cmd === "pm") handleCalc("+-"); }; });
  updateCalc(); renderCalcHistory();

  // ======================== HANDWRITING RECOGNITION WITH MULTI-INTERPRETATION ========================
  let scanHistory = [];
  let currentStream = null;
  let currentFacingMode = "environment";
  let currentInterpretations = [];

  // Enhanced image preprocessing for handwriting
  async function preprocessHandwriting(imageBlob) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        
        const maxDimension = 2500;
        if (width > maxDimension || height > maxDimension) {
          const scale = maxDimension / Math.max(width, height);
          width = Math.floor(width * scale);
          height = Math.floor(height * scale);
        }
        
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // High contrast for handwriting
        const imageData = ctx.getImageData(0, 0, width, height);
        const data = imageData.data;
        
        for (let i = 0; i < data.length; i += 4) {
          let r = data[i];
          let g = data[i + 1];
          let b = data[i + 2];
          let gray = 0.299 * r + 0.587 * g + 0.114 * b;
          
          // Aggressive contrast for handwriting
          if (gray < 140) gray = Math.max(0, gray * 0.6);
          else gray = Math.min(255, gray * 1.4);
          
          data[i] = gray;
          data[i + 1] = gray;
          data[i + 2] = gray;
        }
        
        ctx.putImageData(imageData, 0, 0);
        canvas.toBlob(resolve, 'image/png');
      };
      img.src = URL.createObjectURL(imageBlob);
    });
  }

  // Generate multiple interpretations from OCR text
  function generateInterpretations(rawText) {
    const interpretations = [];
    const text = rawText.toLowerCase().trim();
    
    // Clean the text - remove common OCR artifacts
    let cleaned = text.replace(/[^\w\s\d+\-*/=]/g, ' ').replace(/\s+/g, ' ').trim();
    
    // Pattern 1: Direct number detection (like "1+1" from OCR)
    let mathPatterns = [
      { regex: /(\d+)\s*[+\-*/×÷]\s*(\d+)/, name: "Arithmetic" },
      { regex: /(\d+)\s*plus\s*(\d+)/i, name: "Addition" },
      { regex: /(\d+)\s*minus\s*(\d+)/i, name: "Subtraction" },
      { regex: /(\d+)\s*times\s*(\d+)/i, name: "Multiplication" },
      { regex: /(\d+)\s*divided by\s*(\d+)/i, name: "Division" }
    ];
    
    // Try to extract any numbers with operators
    let numbers = text.match(/\d+/g);
    let operators = text.match(/[+\-*/×÷]/g);
    
    // If we have numbers and operators, create arithmetic interpretations
    if (numbers && numbers.length >= 2) {
      for (let i = 0; i < numbers.length - 1; i++) {
        for (let op of ['+', '-', '*', '/']) {
          let expr = `${numbers[i]}${op}${numbers[i+1]}`;
          try {
            let result = Function('"use strict"; return (' + expr + ')')();
            if (isFinite(result)) {
              interpretations.push({
                original: rawText,
                question: expr,
                answer: `${expr} = ${formatNum(result)}`,
                steps: `Calculated: ${expr} = ${formatNum(result)}`,
                confidence: 85 - (i * 5),
                type: "arithmetic"
              });
            }
          } catch(e) {}
        }
      }
    }
    
    // Look for "1+1" pattern specifically
    let simpleMatch = text.match(/(\d+)\s*[+\-*/]\s*(\d+)/);
    if (simpleMatch) {
      let expr = simpleMatch[0].replace(/\s/g, '');
      try {
        let result = Function('"use strict"; return (' + expr + ')')();
        if (isFinite(result)) {
          interpretations.unshift({
            original: rawText,
            question: expr,
            answer: `${expr} = ${formatNum(result)}`,
            steps: `Direct calculation: ${expr} = ${formatNum(result)}`,
            confidence: 95,
            type: "arithmetic"
          });
        }
      } catch(e) {}
    }
    
    // Prime number detection
    if (text.match(/prime|素数|소수|primo|primzahl/) || text.match(/\d+\s*prime/)) {
      let primeMatch = text.match(/(\d+)/);
      if (primeMatch) {
        let n = parseInt(primeMatch[1]);
        let isP = isPrimeNum(n);
        interpretations.push({
          original: rawText,
          question: `Is ${n} prime?`,
          answer: `${n} is ${isP ? "✅ a prime number" : "❌ not prime (composite)"}`,
          steps: isP ? `${n} has no divisors other than 1 and itself.` : `${n} has factors other than 1 and itself.`,
          confidence: 90,
          type: "prime"
        });
      }
      
      // First prime
      if (text.match(/first|1st|first prime|1st prime/)) {
        interpretations.push({
          original: rawText,
          question: "What is the first prime number?",
          answer: "The first prime number is 2.",
          steps: "Prime numbers: 2, 3, 5, 7, 11... 2 is the smallest and only even prime.",
          confidence: 98,
          type: "prime"
        });
      }
    }
    
    // Median detection
    if (text.match(/median|mediana|中位数|중앙값/)) {
      let nums = extractNumbers(text);
      if (nums.length >= 2) {
        let med = calculateMedian(nums);
        interpretations.push({
          original: rawText,
          question: `Median of [${nums.join(", ")}]`,
          answer: `Median = ${med}`,
          steps: `Numbers: ${nums.join(", ")} → Sorted: ${[...nums].sort((a,b)=>a-b).join(", ")} → Median = ${med}`,
          confidence: 85,
          type: "statistics"
        });
      }
    }
    
    // Triangle area detection
    if (text.match(/triangle|triángulo|三角形|삼각형/)) {
      let nums = extractNumbers(text);
      if (nums.length >= 2) {
        if (nums.length >= 2 && (text.match(/base|height|base|altura|高さ|밑변/))) {
          let area = 0.5 * nums[0] * (nums[1] || nums[0]);
          interpretations.push({
            original: rawText,
            question: `Triangle area with base=${nums[0]}, height=${nums[1] || nums[0]}`,
            answer: `Area = ${area}`,
            steps: `Area = ½ × base × height = ½ × ${nums[0]} × ${nums[1] || nums[0]} = ${area}`,
            confidence: 80,
            type: "geometry"
          });
        } else if (nums.length >= 3) {
          let a = nums[0], b = nums[1], c = nums[2];
          let s = (a + b + c) / 2;
          let area = Math.sqrt(Math.max(0, s * (s - a) * (s - b) * (s - c)));
          interpretations.push({
            original: rawText,
            question: `Triangle area with sides ${a}, ${b}, ${c}`,
            answer: `Area = ${area.toFixed(4)}`,
            steps: `Heron's formula: s = ${s}, Area = √[s(s-a)(s-b)(s-c)] = ${area.toFixed(4)}`,
            confidence: 85,
            type: "geometry"
          });
        }
      }
    }
    
    // Linear equation detection
    let eqMatch = text.match(/(\d*)x\s*([+-]\s*\d+)?\s*=\s*(\d+)/i);
    if (eqMatch) {
      let a = eqMatch[1] ? parseFloat(eqMatch[1]) : 1;
      let b = eqMatch[2] ? parseFloat(eqMatch[2].replace(/\s/g, "")) : 0;
      let c = parseFloat(eqMatch[3]);
      let x = (c - b) / a;
      interpretations.push({
        original: rawText,
        question: `${a}x + ${b} = ${c}`,
        answer: `x = ${formatNum(x)}`,
        steps: `${a}x + ${b} = ${c} → ${a}x = ${c - b} → x = ${formatNum(x)}`,
        confidence: 90,
        type: "algebra"
      });
    }
    
    // If we have raw numbers but no interpretation yet
    if (interpretations.length === 0 && numbers && numbers.length > 0) {
      interpretations.push({
        original: rawText,
        question: `Numbers detected: ${numbers.join(", ")}`,
        answer: `I found numbers: ${numbers.join(", ")}. What would you like to do with them?`,
        steps: "Try: addition, subtraction, multiplication, division, median, or prime check.",
        confidence: 60,
        type: "general"
      });
    }
    
    // Default fallback
    if (interpretations.length === 0) {
      interpretations.push({
        original: rawText,
        question: `OCR read: "${rawText.slice(0, 80)}"`,
        answer: "I couldn't clearly interpret the handwriting. Please ensure text is clear, well-lit, and try again.",
        steps: "Tips: Write larger, use dark ink on white paper, good lighting, steady camera.",
        confidence: 40,
        type: "unknown"
      });
    }
    
    // Sort by confidence
    interpretations.sort((a, b) => b.confidence - a.confidence);
    
    return interpretations;
  }

  function isPrimeNum(n) { if(n<2) return false; if(n===2) return true; if(n%2===0) return false; for(let i=3;i<=Math.sqrt(n);i+=2) if(n%i===0) return false; return true; }
  function extractNumbers(str) { let nums = []; str.replace(/-?\d+(\.\d+)?/g, m => nums.push(parseFloat(m))); return nums; }
  function calculateMedian(nums) { let s = [...nums].sort((a,b)=>a-b); let m = Math.floor(s.length/2); return s.length%2===0 ? (s[m-1]+s[m])/2 : s[m]; }

  function renderInterpretations(interpretations) {
    const container = document.getElementById("interpretationsContainer");
    container.innerHTML = "";
    
    if (!interpretations || interpretations.length === 0) {
      container.innerHTML = '<div style="color: var(--muted); text-align: center; padding: 20px;">No interpretations generated</div>';
      return;
    }
    
    interpretations.forEach((interp, idx) => {
      const card = document.createElement("div");
      card.className = "interpret-card";
      if (idx === 0) card.classList.add("selected");
      card.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span class="confidence-badge">${interp.confidence}% confidence</span>
          <span style="font-size: 0.7rem; background: ${interp.type === 'arithmetic' ? '#22c55e' : '#6366f1'}20; padding: 2px 8px; border-radius: 12px;">${interp.type}</span>
        </div>
        <div class="interpret-original">📝 "${escapeHtml(interp.original.slice(0, 60))}${interp.original.length > 60 ? '...' : ''}"</div>
        <div class="interpret-question">❓ ${escapeHtml(interp.question)}</div>
        <div class="interpret-answer">✅ ${escapeHtml(interp.answer)}</div>
        <div class="interpret-steps">📖 ${escapeHtml(interp.steps.slice(0, 100))}${interp.steps.length > 100 ? '...' : ''}</div>
      `;
      card.onclick = () => {
        // Select this interpretation
        document.querySelectorAll(".interpret-card").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        
        // Update answer area with selected interpretation
        document.getElementById("subjectTag").innerHTML = `🎯 Selected: ${interp.type}`;
        document.getElementById("aiAnswer").innerHTML = `<strong>✅ Answer:</strong><br>${escapeHtml(interp.answer)}`;
        document.getElementById("stepByStep").innerHTML = `<span style="color: #a5b4fc;">📖 ${escapeHtml(interp.steps)}</span>`;
        
        // Update lastAns if numeric result
        let numMatch = interp.answer.match(/-?\d+(\.\d+)?/);
        if (numMatch) lastAnsVal = parseFloat(numMatch[0]);
        
        // Add to calculator expression
        if (interp.type === "arithmetic" && interp.question.includes("=")) {
          let expr = interp.question.split("=")[0].trim();
          calcExpr = expr;
          updateCalc();
        }
      };
      container.appendChild(card);
    });
  }

  async function performHandwritingOCR(imageBlob) {
    const progressSpan = document.getElementById("ocrProgressText");
    progressSpan.textContent = "🔄 Enhancing handwriting image...";
    
    const enhancedBlob = await preprocessHandwriting(imageBlob);
    
    progressSpan.textContent = "🔍 Reading handwriting...";
    
    const worker = await Tesseract.createWorker('eng', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          progressSpan.textContent = `📖 OCR: ${Math.round(m.progress * 100)}%`;
        }
      }
    });
    
    await worker.setParameters({
      tessedit_pageseg_mode: '6',
      preserve_interword_spaces: '1',
      tessedit_char_whitelist: '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ+-*/=().,?:;%$#@! '
    });
    
    const { data: { text } } = await worker.recognize(enhancedBlob);
    await worker.terminate();
    
    progressSpan.textContent = "✅ OCR complete! Generating interpretations...";
    setTimeout(() => { progressSpan.textContent = ""; }, 2000);
    
    let cleaned = text.trim();
    cleaned = cleaned.replace(/\s+/g, ' ').trim();
    
    return cleaned;
  }

  async function processHandwritingImage(file) {
    const loadingSpan = document.getElementById("loadingIndicator");
    loadingSpan.style.display = "inline-block";
    loadingSpan.innerHTML = "<div class='loading'></div>";
    
    const previewImg = document.getElementById("imagePreview");
    const previewContainer = document.getElementById("imagePreviewContainer");
    const imgUrl = URL.createObjectURL(file);
    previewImg.src = imgUrl;
    previewContainer.style.display = "block";
    
    try {
      const extractedText = await performHandwritingOCR(file);
      
      document.getElementById("previewArea").style.display = "block";
      document.getElementById("extractedTextDisplay").innerHTML = escapeHtml(extractedText.slice(0, 500)) + (extractedText.length > 500 ? "..." : "");
      
      const interpretations = generateInterpretations(extractedText);
      currentInterpretations = interpretations;
      renderInterpretations(interpretations);
      
      // Auto-select the highest confidence interpretation for display
      if (interpretations.length > 0) {
        const best = interpretations[0];
        document.getElementById("subjectTag").innerHTML = `🎯 Top: ${best.type} (${best.confidence}%)`;
        document.getElementById("aiAnswer").innerHTML = `<strong>✅ Best Guess:</strong><br>${escapeHtml(best.answer)}`;
        document.getElementById("stepByStep").innerHTML = `<span style="color: #a5b4fc;">📖 ${escapeHtml(best.steps)}</span>`;
        
        let numMatch = best.answer.match(/-?\d+(\.\d+)?/);
        if (numMatch) lastAnsVal = parseFloat(numMatch[0]);
      }
      
      scanHistory.unshift({ name: file.name.slice(0, 25), preview: extractedText.slice(0, 50), interpretations: interpretations.length });
      if(scanHistory.length > 15) scanHistory.pop();
      renderScanHistory();
      
    } catch(e) {
      console.error(e);
      document.getElementById("aiAnswer").innerHTML = "⚠️ OCR processing failed. Please ensure the handwriting is clear, well-lit, and try again.";
    }
    loadingSpan.style.display = "none";
    URL.revokeObjectURL(imgUrl);
  }
  
  function renderScanHistory() {
    let container = document.getElementById("scanHistory");
    container.innerHTML = "";
    for(let item of scanHistory.slice(0, 10)) {
      let div = document.createElement("div");
      div.className = "history-item";
      div.innerHTML = `<span>📎 ${escapeHtml(item.name)}</span><span style="color: #86efac;"> → ${escapeHtml(item.preview)}</span><span style="color: #a5b4fc; margin-left: 8px;">(${item.interpretations} interpretations)</span>`;
      container.appendChild(div);
    }
  }
  
  function escapeHtml(s) { return String(s).replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
  
  // ======================== CAMERA CONTROLS ========================
  const video = document.getElementById("cameraVideo");
  const canvas = document.getElementById("photoCanvas");
  const cameraControls = document.getElementById("cameraControls");
  let currentStreamActive = false;
  
  async function startCamera(facingMode = "environment") {
    if (currentStreamActive && currentStream) currentStream.getTracks().forEach(t => t.stop());
    try {
      const constraints = { video: { facingMode: { exact: facingMode } } };
      currentStream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = currentStream;
      video.style.display = "block";
      cameraControls.style.display = "flex";
      currentStreamActive = true;
    } catch(err) {
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = currentStream;
        video.style.display = "block";
        cameraControls.style.display = "flex";
        currentStreamActive = true;
      } catch(e) { alert("Camera access denied. Please allow camera permissions."); }
    }
  }
  
  function stopCamera() {
    if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
    video.style.display = "none";
    cameraControls.style.display = "none";
    currentStreamActive = false;
  }
  
  function captureAndProcess() {
    if (!video.videoWidth) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(async (blob) => {
      const file = new File([blob], "handwriting-capture.jpg", { type: "image/jpeg" });
      await processHandwritingImage(file);
      stopCamera();
    }, "image/jpeg");
  }
  
  document.getElementById("cameraBtn").onclick = async () => { currentFacingMode = "environment"; await startCamera("environment"); };
  document.getElementById("switchCameraBtn").onclick = async () => { currentFacingMode = currentFacingMode === "environment" ? "user" : "environment"; await startCamera(currentFacingMode); };
  document.getElementById("capturePhotoBtn").onclick = captureAndProcess;
  document.getElementById("closeCameraBtn").onclick = stopCamera;
  document.getElementById("uploadBtn").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange = async (e) => { if (e.target.files.length) await processHandwritingImage(e.target.files[0]); };
  document.getElementById("clearPreview").onclick = () => document.getElementById("previewArea").style.display = "none";
  
  renderScanHistory();
</script>
