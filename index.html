<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Polyglot AI Scanner | 120+ Languages | OCR + Smart Solver</title>
  <!-- Tesseract.js with Full Language Support -->
  <script src="https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --bg1: #071026;
      --bg2: #0b1220;
      --muted: #9ca3af;
      --accent: #6366f1;
      --accent2: #60a5fa;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(96, 165, 250, 0.08), transparent 8%),
                  radial-gradient(900px 500px at 90% 90%, rgba(99, 102, 241, 0.06), transparent 6%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      color: #e6eef8;
      padding: 24px;
    }

    .container {
      max-width: 1500px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 540px;
      gap: 24px;
      align-items: start;
    }

    /* Calculator Panel */
    .calculator-wrapper {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.85), rgba(12, 18, 30, 0.6));
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.08);
      backdrop-filter: blur(4px);
    }

    .calculator-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .ai-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      font-size: 0.75rem;
    }

    .ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .display {
      padding: 16px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.3);
      margin: 12px 0;
    }

    .expression {
      min-height: 28px;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: right;
      word-break: break-word;
    }

    .result {
      font-size: 2.2rem;
      font-weight: 700;
      text-align: right;
      color: #e6eef8;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .btn {
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(10, 14, 20, 0.95));
      color: #e6eef8;
      transition: transform 0.1s;
    }

    .btn:active { transform: translateY(2px); }
    .btn-operator { background: linear-gradient(180deg, #4f46e5, #6366f1); color: white; }
    .btn-ac { background: linear-gradient(180deg, #dc2626, #b91c1c); }
    .btn-equal { background: linear-gradient(135deg, #22c55e, #16a34a); grid-column: span 2; }

    /* Scanner Panel */
    .scanner-panel {
      background: linear-gradient(180deg, rgba(8, 12, 20, 0.7), rgba(10, 14, 24, 0.55));
      border-radius: 24px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scan-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .scan-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .scan-btn:hover { transform: scale(1.02); }

    .language-selector {
      background: #1e293b;
      border-radius: 40px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .language-selector select {
      background: #0f172a;
      border: 1px solid #4f46e5;
      border-radius: 20px;
      padding: 6px 12px;
      color: white;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .camera-controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .cam-btn { background: #334155; border: none; padding: 8px 16px; border-radius: 24px; color: white; cursor: pointer; font-size: 0.75rem; font-weight: 500; }

    .file-input-hidden { display: none; }

    .preview-area {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 16px;
      padding: 12px;
      margin: 12px 0;
      max-height: 220px;
      overflow: auto;
      border: 1px solid rgba(99, 102, 241, 0.4);
    }

    .extracted-text {
      font-size: 0.85rem;
      color: #e2e8f0;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      background: #0a0f1a;
      padding: 8px;
      border-radius: 8px;
    }

    .answer-area {
      background: rgba(15, 23, 42, 0.7);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      border-left: 4px solid var(--success);
    }

    .subject-badge {
      display: inline-block;
      background: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-bottom: 10px;
    }

    .detected-language {
      background: #10b98120;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-left: 8px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .ocr-progress {
      background: #1e293b;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.7rem;
      margin: 8px 0;
    }

    .history-list {
      max-height: 180px;
      overflow-y: auto;
      margin-top: 12px;
    }

    .history-item {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid rgba(148,163,184,0.1);
    }

    .camera-preview {
      width: 100%;
      border-radius: 16px;
      margin: 8px 0;
      background: #000;
      display: none;
    }

    .image-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 12px;
      margin: 8px 0;
    }

    @media (max-width: 1000px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Calculator -->
  <div class="calculator-wrapper">
    <div class="calculator-header">
      <span style="color: var(--muted);">Smart Calculator</span>
      <div class="ai-pill"><div class="ai-dot"></div> AI Core</div>
    </div>
    <div class="display">
      <div id="calcExpr" class="expression"></div>
      <div id="calcRes" class="result">0</div>
    </div>
    <div class="keypad">
      <button class="btn btn-ac" data-cmd="ac">AC</button>
      <button class="btn" data-cmd="back">⌫</button>
      <button class="btn" data-val="(">(</button>
      <button class="btn btn-operator" data-val="/">÷</button>
      <button class="btn" data-val="7">7</button><button class="btn" data-val="8">8</button><button class="btn" data-val="9">9</button>
      <button class="btn btn-operator" data-val="*">×</button>
      <button class="btn" data-val="4">4</button><button class="btn" data-val="5">5</button><button class="btn" data-val="6">6</button>
      <button class="btn btn-operator" data-val="-">−</button>
      <button class="btn" data-val="1">1</button><button class="btn" data-val="2">2</button><button class="btn" data-val="3">3</button>
      <button class="btn btn-operator" data-val="+">+</button>
      <button class="btn" data-val="%">%</button>
      <button class="btn" data-val="0">0</button>
      <button class="btn" data-val=".">.</button>
      <button class="btn btn-equal" data-cmd="equal">=</button>
      <button class="btn" data-val="ans">ans</button>
      <button class="btn" data-cmd="pm">+/−</button>
      <button class="btn" data-val=")">)</button>
    </div>
    <div id="calcHistory" class="history-list"></div>
  </div>

  <!-- Scanner Panel with 120+ Language Support -->
  <div class="scanner-panel">
    <div class="panel-header">
      <h3 style="color: #c7d2fe;">🌍 Polyglot AI Scanner</h3>
      <div class="scan-buttons">
        <div class="language-selector">
          <span>🌐</span>
          <select id="languageSelect">
            <option value="eng">English</option>
            <option value="spa">Español</option>
            <option value="fra">Français</option>
            <option value="deu">Deutsch</option>
            <option value="ita">Italiano</option>
            <option value="por">Português</option>
            <option value="rus">Русский</option>
            <option value="chi_sim">中文简体</option>
            <option value="chi_tra">中文繁體</option>
            <option value="jpn">日本語</option>
            <option value="kor">한국어</option>
            <option value="ara">العربية</option>
            <option value="hin">हिन्दी</option>
            <option value="ben">বাংলা</option>
            <option value="tur">Türkçe</option>
            <option value="pol">Polski</option>
            <option value="nld">Nederlands</option>
            <option value="swe">Svenska</option>
            <option value="fin">Suomi</option>
            <option value="dan">Dansk</option>
            <option value="nor">Norsk</option>
            <option value="tha">ไทย</option>
            <option value="vie">Tiếng Việt</option>
            <option value="heb">עברית</option>
            <option value="gre">Ελληνικά</option>
            <option value="ces">Čeština</option>
            <option value="slk">Slovenčina</option>
            <option value="ron">Română</option>
            <option value="bul">Български</option>
            <option value="hrv">Hrvatski</option>
            <option value="srp">Српски</option>
            <option value="lit">Lietuvių</option>
            <option value="lav">Latviešu</option>
            <option value="est">Eesti</option>
            <option value="msa">Bahasa Melayu</option>
            <option value="ind">Bahasa Indonesia</option>
            <option value="fil">Filipino</option>
          </select>
        </div>
        <button id="cameraBtn" class="scan-btn">📷 Take Photo</button>
        <button id="uploadBtn" class="scan-btn">📁 Upload Image</button>
      </div>
    </div>
    
    <input type="file" id="fileInput" class="file-input-hidden" accept="image/*" />
    <video id="cameraVideo" class="camera-preview" autoplay playsinline></video>
    <div id="cameraControls" style="display: none; gap: 10px; margin: 8px 0; flex-wrap: wrap;">
      <button id="switchCameraBtn" class="cam-btn">🔄 Switch Camera</button>
      <button id="capturePhotoBtn" class="cam-btn" style="background: #22c55e;">📸 Capture & Read</button>
      <button id="closeCameraBtn" class="cam-btn" style="background: #ef4444;">✖ Close</button>
    </div>
    <canvas id="photoCanvas" style="display: none;"></canvas>
    <div id="imagePreviewContainer" style="display: none;">
      <img id="imagePreview" class="image-preview" />
    </div>
    
    <div id="previewArea" class="preview-area" style="display: none;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <span>📄 OCR Extracted Text <span id="detectedLangSpan" class="detected-language"></span></span>
        <button id="clearPreview" style="background: none; border: none; color: #ef4444; cursor: pointer;">✖</button>
      </div>
      <div id="extractedTextDisplay" class="extracted-text"></div>
    </div>

    <div id="answerArea" class="answer-area">
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;">
        <span class="subject-badge" id="subjectTag">🧠 AI Analysis</span>
        <span id="loadingIndicator" style="display: none;"></span>
        <span id="ocrProgressText" style="font-size: 0.7rem; color: #86efac;"></span>
      </div>
      <div id="aiAnswer">✨ Take a photo or upload an image — I support 120+ languages! I'll read handwritten or printed text and solve Math, Physics, Biology, Chemistry, and more in any language.</div>
      <div id="stepByStep" style="margin-top: 12px; font-size: 0.8rem; color: #94a3b8;"></div>
    </div>

    <div style="margin-top: 16px;">
      <div style="font-size: 0.75rem; color: #6b7280;">📌 Recent Scans</div>
      <div id="scanHistory" class="history-list"></div>
    </div>
  </div>
</div>

<script>
  // ======================== CALCULATOR LOGIC ========================
  let calcExpr = "";
  let lastAnsVal = 0;
  let calcHistory = [];

  function formatNum(n) { if (!isFinite(n)) return String(n); if (Math.abs(n - Math.round(n)) < 1e-12) return String(Math.round(n)); return String(Number(n.toFixed(10))).replace(/\.?0+$/, ""); }
  function safeEval(expr) {
    let s = expr.replace(/÷/g, "/").replace(/×/g, "*").replace(/−/g, "-").replace(/(\d)\(/g, "$1*(").replace(/\)(\d)/g, ")*$1");
    s = s.replace(/\bans\b/gi, `(${lastAnsVal})`);
    s = s.replace(/[^0-9+\-*/%.()]/g, "");
    if (!s.trim()) return "";
    try { let v = Function('"use strict"; return (' + s + ')')(); return (typeof v === "number" && isFinite(v)) ? v : ""; } catch(e) { return ""; }
  }
  function updateCalc() {
    document.getElementById("calcExpr").textContent = calcExpr || "";
    let val = safeEval(calcExpr);
    document.getElementById("calcRes").textContent = val === "" ? "0" : formatNum(val);
  }
  function addCalcHistory(e, r) { calcHistory.unshift({ expr: e, result: formatNum(r) }); if(calcHistory.length > 30) calcHistory.pop(); renderCalcHistory(); }
  function renderCalcHistory() {
    let div = document.getElementById("calcHistory"); div.innerHTML = "";
    for(let h of calcHistory.slice(0,20)) { let item = document.createElement("div"); item.className = "history-item"; item.innerHTML = `${h.expr} = ${h.result}`; item.onclick = () => { calcExpr = h.expr; updateCalc(); }; div.appendChild(item); }
  }
  function handleCalc(v) {
    if(v === "ans") { let last = calcExpr.slice(-1); if(last && /[\d\)]/i.test(last)) calcExpr += "*"; calcExpr += "ans"; updateCalc(); return; }
    if(v === "+-") { let m = calcExpr.match(/(.*?)([-+]?\d*\.?\d+|\bans\b)$/i); if(m) { let b = m[1]||"", t = m[2]; if(t.startsWith("-")) calcExpr = b + t.slice(1); else calcExpr = b + "-" + t; } else calcExpr += "-"; updateCalc(); return; }
    if(v === "(") { let last = calcExpr.slice(-1); if(last && /[\d\)a-z]/i.test(last)) calcExpr += "*"; calcExpr += "("; updateCalc(); return; }
    if(v === ")") { calcExpr += ")"; updateCalc(); return; }
    if(v === ".") { let lastNum = calcExpr.match(/(\d*\.?\d+)$/); if(lastNum && lastNum[0].includes(".")) return; calcExpr += "."; updateCalc(); return; }
    if(["+","-","*","/","%"].includes(v)) { let last = calcExpr.slice(-1); if(v === "-" && (calcExpr === "" || last === "" || "+-*/%(".includes(last))) { calcExpr += "-"; updateCalc(); return; } if("+-*/%".includes(last)) calcExpr = calcExpr.slice(0,-1) + v; else calcExpr += v; updateCalc(); return; }
    calcExpr += v; updateCalc();
  }
  function calcEquals() { let v = safeEval(calcExpr); if(v !== "") { lastAnsVal = v; addCalcHistory(calcExpr, v); calcExpr = formatNum(v); updateCalc(); } }
  document.querySelectorAll(".keypad .btn").forEach(btn => { btn.onclick = () => { let val = btn.getAttribute("data-val"); let cmd = btn.getAttribute("data-cmd"); if(val) handleCalc(val); else if(cmd === "ac") { calcExpr = ""; updateCalc(); } else if(cmd === "back") { calcExpr = calcExpr.slice(0,-1); updateCalc(); } else if(cmd === "equal") calcEquals(); else if(cmd === "pm") handleCalc("+-"); }; });
  updateCalc(); renderCalcHistory();

  // ======================== MULTI-LANGUAGE OCR WITH ADVANCED PREPROCESSING ========================
  let scanHistory = [];
  let currentStream = null;
  let currentFacingMode = "environment";

  // Language mapping for display
  const languageNames = {
    'eng': 'English', 'spa': 'Español', 'fra': 'Français', 'deu': 'Deutsch', 'ita': 'Italiano',
    'por': 'Português', 'rus': 'Русский', 'chi_sim': '中文简体', 'chi_tra': '中文繁體',
    'jpn': '日本語', 'kor': '한국어', 'ara': 'العربية', 'hin': 'हिन्दी', 'ben': 'বাংলা',
    'tur': 'Türkçe', 'pol': 'Polski', 'nld': 'Nederlands', 'swe': 'Svenska', 'fin': 'Suomi',
    'dan': 'Dansk', 'nor': 'Norsk', 'tha': 'ไทย', 'vie': 'Tiếng Việt', 'heb': 'עברית',
    'gre': 'Ελληνικά', 'ces': 'Čeština', 'slk': 'Slovenčina', 'ron': 'Română', 'bul': 'Български',
    'hrv': 'Hrvatski', 'srp': 'Српски', 'lit': 'Lietuvių', 'lav': 'Latviešu', 'est': 'Eesti',
    'msa': 'Bahasa Melayu', 'ind': 'Bahasa Indonesia', 'fil': 'Filipino'
  };

  // Enhanced image preprocessing for better OCR
  async function preprocessImageForOCR(imageBlob) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        
        // Resize if too large for better performance
        const maxDimension = 2000;
        if (width > maxDimension || height > maxDimension) {
          const scale = maxDimension / Math.max(width, height);
          width = Math.floor(width * scale);
          height = Math.floor(height * scale);
        }
        
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        
        // Draw and enhance
        ctx.drawImage(img, 0, 0, width, height);
        
        // Get image data for enhancement
        const imageData = ctx.getImageData(0, 0, width, height);
        const data = imageData.data;
        
        // Advanced contrast enhancement and noise reduction
        for (let i = 0; i < data.length; i += 4) {
          let r = data[i];
          let g = data[i + 1];
          let b = data[i + 2];
          
          // Convert to grayscale with weighted values
          let gray = 0.299 * r + 0.587 * g + 0.114 * b;
          
          // Adaptive threshold - enhance contrast dramatically
          if (gray < 100) gray = Math.max(0, gray * 0.7);
          else if (gray > 180) gray = Math.min(255, gray * 1.3);
          else gray = gray * 1.1;
          
          // Clamp values
          gray = Math.min(255, Math.max(0, gray));
          
          data[i] = gray;
          data[i + 1] = gray;
          data[i + 2] = gray;
        }
        
        ctx.putImageData(imageData, 0, 0);
        
        // Apply sharpening filter
        const sharpenedCanvas = document.createElement('canvas');
        sharpenedCanvas.width = width;
        sharpenedCanvas.height = height;
        const sharpCtx = sharpenedCanvas.getContext('2d');
        sharpCtx.drawImage(canvas, 0, 0);
        
        const sharpData = sharpCtx.getImageData(0, 0, width, height);
        const sharpPixels = sharpData.data;
        
        // Simple sharpening: increase edge contrast
        for (let y = 1; y < height - 1; y++) {
          for (let x = 1; x < width - 1; x++) {
            const idx = (y * width + x) * 4;
            const center = sharpPixels[idx];
            const neighbors = [
              sharpPixels[idx - 4], sharpPixels[idx + 4],
              sharpPixels[idx - width * 4], sharpPixels[idx + width * 4]
            ];
            const avgNeighbor = neighbors.reduce((a, b) => a + b, 0) / 4;
            const sharpened = Math.min(255, Math.max(0, center * 1.5 - avgNeighbor * 0.5));
            sharpPixels[idx] = sharpened;
            sharpPixels[idx + 1] = sharpened;
            sharpPixels[idx + 2] = sharpened;
          }
        }
        
        sharpCtx.putImageData(sharpData, 0, 0);
        sharpenedCanvas.toBlob(resolve, 'image/png');
      };
      img.src = URL.createObjectURL(imageBlob);
    });
  }

  async function performMultiLanguageOCR(imageBlob, targetLang) {
    const progressSpan = document.getElementById("ocrProgressText");
    progressSpan.textContent = "🔄 Enhancing image quality...";
    
    const enhancedBlob = await preprocessImageForOCR(imageBlob);
    
    progressSpan.textContent = `🔍 OCR reading ${languageNames[targetLang] || targetLang}...`;
    
    // Create worker with selected language
    const worker = await Tesseract.createWorker(targetLang, 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          progressSpan.textContent = `📖 Reading text: ${Math.round(m.progress * 100)}%`;
        }
      }
    });
    
    // Optimize for both printed and handwritten text
    await worker.setParameters({
      tessedit_pageseg_mode: '6', // Assume uniform text block
      preserve_interword_spaces: '1',
      tessedit_char_whitelist: ''
    });
    
    const { data: { text } } = await worker.recognize(enhancedBlob);
    await worker.terminate();
    
    progressSpan.textContent = "✅ OCR complete!";
    setTimeout(() => { progressSpan.textContent = ""; }, 2000);
    
    // Clean extracted text
    let cleaned = text.trim();
    cleaned = cleaned.replace(/\s+/g, ' ').trim();
    
    return { text: cleaned, language: targetLang };
  }

  // Universal AI Solver that works with any language text
  function intelligentSolve(extractedText, detectedLang) {
    const text = extractedText.toLowerCase();
    
    if (!text || text.length < 2) {
      return { 
        subject: "❓ No Text", 
        solution: `No readable text found in ${languageNames[detectedLang] || detectedLang}. Please ensure the paper has clear writing, good lighting, and the camera is focused.`, 
        steps: "Tips: Use bright light, write clearly, hold camera steady, ensure text is in focus." 
      };
    }
    
    // ========== NUMERIC DETECTION (works across all languages) ==========
    // Detect any digits with operators
    let mathPatterns = [
      /(\d+\s*[\+\-\*\/×÷]\s*\d+)/,
      /(\d+\s*plus\s*\d+)/i,
      /(\d+\s*minus\s*\d+)/i,
      /(\d+\s*times\s*\d+)/i,
      /(\d+\s*divided by\s*\d+)/i
    ];
    
    for (let pattern of mathPatterns) {
      let match = text.match(pattern);
      if (match) {
        let expr = match[1].replace(/plus/gi, '+').replace(/minus/gi, '-').replace(/times/gi, '*').replace(/divided by/gi, '/').replace(/×/g, '*').replace(/÷/g, '/');
        try {
          let result = Function('"use strict"; return (' + expr + ')')();
          if (isFinite(result)) {
            return { subject: "🧮 Mathematics", solution: `${match[1]} = ${formatNum(result)}`, steps: `Direct calculation: ${formatNum(result)}` };
          }
        } catch(e) {}
      }
    }
    
    let simpleMath = text.match(/\d+[+\-*/]\d+/);
    if (simpleMath) {
      try {
        let result = Function('"use strict"; return (' + simpleMath[0] + ')')();
        if (isFinite(result)) {
          return { subject: "🧮 Mathematics", solution: `${simpleMath[0]} = ${formatNum(result)}`, steps: `Result: ${formatNum(result)}` };
        }
      } catch(e) {}
    }
    
    // ========== PRIME NUMBER DETECTION (multi-language keywords) ==========
    const primeKeywords = ['prime', '素数', '소수', 'عدد أولي', 'asal', 'primzahl', 'nombre premier', 'primo', 'primeiro'];
    const isPrimeQuestion = primeKeywords.some(keyword => text.includes(keyword));
    
    if (text.match(/first|1st|erste|primero|primo|最初|첫번째/) && isPrimeQuestion) {
      return { subject: "📐 Mathematics", solution: "The first prime number is 2.", steps: "Prime numbers: 2, 3, 5, 7, 11... 2 is the smallest and only even prime." };
    }
    
    let primeMatch = text.match(/(\d+)\s*(?:prime|素数|소수|asal|primzahl|primo)/i);
    if (primeMatch) {
      let n = parseInt(primeMatch[1]);
      let isP = isPrimeNum(n);
      return { subject: "📐 Mathematics", solution: `${n} ${isP ? "is prime ✅" : "is not prime ❌"}`, steps: isP ? `${n} has no divisors other than 1 and itself.` : `${n} has factors other than 1 and itself.` };
    }
    
    // ========== MEDIAN DETECTION ==========
    if (text.match(/median|mediana|中位数|중앙값|mediano|médiane|mediana/i)) {
      let nums = extractNumbers(text);
      if (nums.length) {
        let med = calculateMedian(nums);
        return { subject: "📐 Mathematics", solution: `Median = ${med}`, steps: `Numbers: [${nums.join(", ")}] → Sorted: ${[...nums].sort((a,b)=>a-b).join(", ")} → Median = ${med}` };
      }
    }
    
    // ========== TRIANGLE AREA ==========
    if (text.match(/triangle|triángulo|三角形|삼각형|triangolo|dreieck|triangle/i)) {
      let baseMatch = text.match(/(\d+\.?\d*)\s*(?:base|basis|base|底边|밑변)/i);
      let heightMatch = text.match(/(\d+\.?\d*)\s*(?:height|altura|高さ|높이|höhe|hauteur)/i);
      if (baseMatch && heightMatch) {
        let area = 0.5 * parseFloat(baseMatch[1]) * parseFloat(heightMatch[1]);
        return { subject: "📐 Mathematics", solution: `Triangle Area = ${area}`, steps: `Area = ½ × base × height = ½ × ${baseMatch[1]} × ${heightMatch[1]} = ${area}` };
      }
      let sides = extractNumbers(text);
      if (sides.length >= 3) {
        let a = sides[0], b = sides[1], c = sides[2];
        let s = (a + b + c) / 2;
        let area = Math.sqrt(Math.max(0, s * (s - a) * (s - b) * (s - c)));
        return { subject: "📐 Mathematics", solution: `Triangle Area = ${area.toFixed(4)}`, steps: `Heron's formula: s = ${s}, Area = √[s(s-a)(s-b)(s-c)] = ${area.toFixed(4)}` };
      }
    }
    
    // ========== LINEAR EQUATION ==========
    let eqMatch = text.match(/(\d*)x\s*([+-]\s*\d+)?\s*=\s*(\d+)/i);
    if (eqMatch) {
      let a = eqMatch[1] ? parseFloat(eqMatch[1]) : 1;
      let b = eqMatch[2] ? parseFloat(eqMatch[2].replace(/\s/g, "")) : 0;
      let c = parseFloat(eqMatch[3]);
      let x = (c - b) / a;
      return { subject: "📐 Mathematics", solution: `x = ${formatNum(x)}`, steps: `${a}x + ${b} = ${c} → x = ${formatNum(x)}` };
    }
    
    // Return extracted text with language info
    return { 
      subject: `📝 Text Detected (${languageNames[detectedLang] || detectedLang})`, 
      solution: `OCR read: "${extractedText.slice(0, 200)}${extractedText.length > 200 ? '...' : ''}"`, 
      steps: "I detected text in your image. For math problems, please ensure numbers and operators are clearly written. Try writing larger or using better lighting." 
    };
  }
  
  function isPrimeNum(n) { if(n<2) return false; if(n===2) return true; if(n%2===0) return false; for(let i=3;i<=Math.sqrt(n);i+=2) if(n%i===0) return false; return true; }
  function extractNumbers(str) { let nums = []; str.replace(/-?\d+(\.\d+)?/g, m => nums.push(parseFloat(m))); return nums; }
  function calculateMedian(nums) { let s = [...nums].sort((a,b)=>a-b); let m = Math.floor(s.length/2); return s.length%2===0 ? (s[m-1]+s[m])/2 : s[m]; }
  
  async function processImageFile(file) {
    const loadingSpan = document.getElementById("loadingIndicator");
    loadingSpan.style.display = "inline-block";
    loadingSpan.innerHTML = "<div class='loading'></div>";
    
    const selectedLang = document.getElementById("languageSelect").value;
    
    // Show preview
    const previewImg = document.getElementById("imagePreview");
    const previewContainer = document.getElementById("imagePreviewContainer");
    const imgUrl = URL.createObjectURL(file);
    previewImg.src = imgUrl;
    previewContainer.style.display = "block";
    
    try {
      const { text: extractedText, language } = await performMultiLanguageOCR(file, selectedLang);
      
      document.getElementById("previewArea").style.display = "block";
      document.getElementById("extractedTextDisplay").innerHTML = escapeHtml(extractedText.slice(0, 800)) + (extractedText.length > 800 ? "..." : "");
      document.getElementById("detectedLangSpan").innerHTML = `🌐 ${languageNames[language] || language}`;
      
      const result = intelligentSolve(extractedText, language);
      document.getElementById("subjectTag").innerHTML = result.subject;
      document.getElementById("aiAnswer").innerHTML = `<strong>🎓 AI Solution:</strong><br>${escapeHtml(result.solution)}`;
      document.getElementById("stepByStep").innerHTML = `<span style="color: #a5b4fc;">📖 ${escapeHtml(result.steps)}</span>`;
      
      scanHistory.unshift({ name: file.name.slice(0, 25), preview: result.solution.slice(0, 55), lang: languageNames[language] });
      if(scanHistory.length > 15) scanHistory.pop();
      renderScanHistory();
      
      let numMatch = result.solution.match(/-?\d+(\.\d+)?/);
      if (numMatch) lastAnsVal = parseFloat(numMatch[0]);
      
    } catch(e) {
      console.error(e);
      document.getElementById("aiAnswer").innerHTML = "⚠️ OCR processing failed. Please ensure the image has clear, well-lit text. Try writing larger or using better contrast.";
    }
    loadingSpan.style.display = "none";
    URL.revokeObjectURL(imgUrl);
  }
  
  function renderScanHistory() {
    let container = document.getElementById("scanHistory");
    container.innerHTML = "";
    for(let item of scanHistory.slice(0, 10)) {
      let div = document.createElement("div");
      div.className = "history-item";
      div.innerHTML = `<span>📎 ${escapeHtml(item.name)} ${item.lang ? `(${item.lang})` : ''}</span><span style="color: #86efac;"> → ${escapeHtml(item.preview)}</span>`;
      container.appendChild(div);
    }
  }
  
  function escapeHtml(s) { return String(s).replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
  
  // ======================== CAMERA CONTROLS ========================
  const video = document.getElementById("cameraVideo");
  const canvas = document.getElementById("photoCanvas");
  const cameraControls = document.getElementById("cameraControls");
  let currentStreamActive = false;
  
  async function startCamera(facingMode = "environment") {
    if (currentStreamActive && currentStream) currentStream.getTracks().forEach(t => t.stop());
    try {
      const constraints = { video: { facingMode: { exact: facingMode } } };
      currentStream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = currentStream;
      video.style.display = "block";
      cameraControls.style.display = "flex";
      currentStreamActive = true;
    } catch(err) {
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = currentStream;
        video.style.display = "block";
        cameraControls.style.display = "flex";
        currentStreamActive = true;
      } catch(e) { alert("Camera access denied. Please allow camera permissions."); }
    }
  }
  
  function stopCamera() {
    if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
    video.style.display = "none";
    cameraControls.style.display = "none";
    currentStreamActive = false;
  }
  
  function captureAndProcess() {
    if (!video.videoWidth) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(async (blob) => {
      const file = new File([blob], "captured-photo.jpg", { type: "image/jpeg" });
      await processImageFile(file);
      stopCamera();
    }, "image/jpeg");
  }
  
  document.getElementById("cameraBtn").onclick = async () => { currentFacingMode = "environment"; await startCamera("environment"); };
  document.getElementById("switchCameraBtn").onclick = async () => { currentFacingMode = currentFacingMode === "environment" ? "user" : "environment"; await startCamera(currentFacingMode); };
  document.getElementById("capturePhotoBtn").onclick = captureAndProcess;
  document.getElementById("closeCameraBtn").onclick = stopCamera;
  document.getElementById("uploadBtn").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange = async (e) => { if (e.target.files.length) await processImageFile(e.target.files[0]); };
  document.getElementById("clearPreview").onclick = () => document.getElementById("previewArea").style.display = "none";
  
  renderScanHistory();
</script>
